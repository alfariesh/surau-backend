services:
  # The whole suite registers users from one container IP, so the per-IP
  # register budget must exceed the total registrations across all tests.
  app:
    environment:
      AUTH_RATE_LIMIT_REGISTER_IP_MAX: "100"

  integration-test:
    container_name: integration-test
    platform: linux/amd64
    pid: "host"
    build:
      context: .
      dockerfile: integration-test/Dockerfile
    environment:
      RUN_INTEGRATION_TESTS: "1"
      INTEGRATION_HTTP_URL: "http://app:8080"
    depends_on:
      - app
    networks:
      app_network:
        aliases:
          - test.lvh.me


networks:
  app_network:
    external: false
