# Alert operasional Surau, termasuk app-down (menutup skenario schema-DIRTY
# boot-loop) dan mass-failure push Q-6.
# NB: JANGAN pakai `or` antar vektor ber-label identik (sisi kanan dibuang);
# gabungkan dengan aritmetika seperti pada rule email.
# Konvensi: ambang ada DI DALAM PromQL ("> bool X") sehingga rule membaca
# 'nilai > 0 berarti menyala' — simulasi = mengubah satu angka di file ini.
apiVersion: 1
groups:
  - orgId: 1
    name: surau-f1b
    folder: Surau
    interval: 1m
    rules:
      - uid: surau-5xx-surge
        title: 5xx surge
        condition: C
        for: 2m
        labels:
          env: $OBS_ENV_LABEL
          source: f1b
        annotations:
          summary: API mengeluarkan error 5xx beruntun (>0.2 rps selama 2 menit) — kemungkinan DB down/migrasi
            gagal/bug rilis.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) > bool 0.2
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
      - uid: surau-p95-breach
        title: p95 latency breach
        condition: C
        for: 10m
        labels:
          env: $OBS_ENV_LABEL
          source: f1b
        annotations:
          summary: p95 latency API di atas 500ms selama 10 menit — periksa query lambat / beban.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
                > bool 0.5
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
      - uid: surau-email-stuck
        title: email stuck / dead letter
        condition: C
        for: 2m
        labels:
          env: $OBS_ENV_LABEL
          source: f1b
        annotations:
          summary: Ada email macet >30 menit atau gagal permanen (dead letter) — periksa dispatcher &
            penyedia email.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: (surau_email_failed + (surau_email_oldest_due_seconds > bool 1800)) > bool 0
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
      - uid: surau-notification-mass-failure
        title: OneSignal mass delivery failure
        condition: C
        for: 1m
        labels:
          env: $OBS_ENV_LABEL
          source: q6
        annotations:
          summary: Sedikitnya 5 percobaan push gagal dan rasio kegagalan mencapai 50% dalam 5 menit
            — periksa kredensial, rate-limit, status OneSignal, dan log notification_reminder.
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >-
                (
                  (
                    sum(max without(instance, job) (
                      surau_notification_delivery_attempts_5m{result="failed"}
                    )) >= bool 5
                  )
                  *
                  (
                    sum(max without(instance, job) (
                      surau_notification_delivery_attempts_5m{result="failed"}
                    ))
                    /
                    clamp_min(sum(max without(instance, job) (
                      surau_notification_delivery_attempts_5m
                    )), 1)
                    >= bool 0.5
                  )
                ) > bool 0
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
      - uid: surau-onesignal-erasure-stale
        title: OneSignal user erasure exceeded 24 hours
        condition: C
        for: 1m
        labels:
          env: $OBS_ENV_LABEL
          source: privacy
        annotations:
          summary: Ada penghapusan user OneSignal yang belum terverifikasi setelah 24 jam — buka
            runbook docs/onesignal-erasure.md dan telusuri hanya dengan HMAC audit.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: max(surau_onesignal_erasure_stale) > bool 0
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
      - uid: surau-onesignal-erasure-provider-auth
        title: OneSignal erasure provider authorization failure
        condition: C
        for: 1m
        labels:
          env: $OBS_ENV_LABEL
          source: privacy
        annotations:
          summary: OneSignal menolak App API Key untuk penghapusan user — periksa secret provider;
            jangan menyalin key, UUID, atau JWT ke log/tiket.
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >-
                sum(increase(surau_onesignal_erasure_attempts_total{
                  outcome="failed",reason_code="unauthorized"
                }[5m])) > bool 0
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
      - uid: surau-citable-audit
        title: citable unit registry violation
        condition: C
        for: 5m
        labels:
          env: $OBS_ENV_LABEL
          source: b1
        annotations:
          summary: Audit registry Citable Unit menemukan pelanggaran invarian (sitasi menggantung /
            hash mismatch / lineage rusak) — cek surau_citable_audit_violations per check, lalu log
            loop citable_unit_audit.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: sum(surau_citable_audit_violations) > bool 0
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
      - uid: surau-backup-heartbeat
        title: backup heartbeat stale
        condition: C
        for: 5m
        labels:
          env: $OBS_ENV_LABEL
          source: f1b
        annotations:
          summary: Backup harian TIDAK sukses >26 jam — dead-man F1-A; periksa journalctl -u surau-pg-backup.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: (time() - surau_backup_last_success_timestamp) > bool (26 * 3600)
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Error
      - uid: surau-disk-low
        title: disk space low
        condition: C
        for: 5m
        labels:
          env: $OBS_ENV_LABEL
          source: f1b
        annotations:
          summary: Sisa disk < 15% — bersihkan image/log atau perbesar disk sebelum penuh.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: 100 * node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < bool 15
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
      - uid: surau-app-down
        title: app down
        condition: C
        for: 3m
        labels:
          env: $OBS_ENV_LABEL
          source: f1b
        annotations:
          summary: Aplikasi tidak bisa di-scrape ≥3 menit — kemungkinan crash-loop (mis. schema DIRTY
            saat boot).
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: up{job="surau-app"} == bool 0
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
      - uid: surau-db-connections
        title: db connections near max
        condition: C
        for: 5m
        labels:
          env: $OBS_ENV_LABEL
          source: f1g
        annotations:
          summary: Koneksi Postgres >80% dari max_connections selama 5 menit — pool bocor
            atau beban tak wajar; cek pg_stat_activity sebelum aplikasi mulai ditolak koneksi.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: (sum(pg_stat_activity_count) / max(pg_settings_max_connections)) > bool 0.8
              instant: true
              range: false
              datasource:
                type: prometheus
                uid: prometheus
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
