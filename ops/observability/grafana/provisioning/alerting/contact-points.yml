# TEMPLATE ONLY — the real file is generated on each VPS at
# /etc/surau-obs/contact-points.yml (literal values, chatid quoted) and
# bind-mounted OVER this path, because Grafana's $ENV interpolation re-types
# a purely numeric chat id into a JSON number and the telegram integration
# rejects it. See docs/observability.md §Rollout.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram-salman
    receivers:
      - uid: telegram-salman
        type: telegram
        settings:
          bottoken: CHANGE_ME_TELEGRAM_TOKEN
          chatid: "0"
          message: "[template] {{ .Status }}"
        disableResolveMessage: false
