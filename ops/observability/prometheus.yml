# Prometheus for one Surau VPS (dev or prod). Scrapes the app over the compose
# network (the edge 404 on /metrics only applies to public traffic) plus the
# host node_exporter. The environment label rides on the Grafana alert rules
# (provisioning supports $ENV there; Prometheus config does not).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: surau-app
    static_configs:
      - targets: ["app:8080"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
