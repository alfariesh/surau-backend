# Minimal single-binary Tempo: OTLP in, local storage, 48h retention —
# lightweight self-hosted trace backend (F1-B).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 48h

usage_report:
  reporting_enabled: false
