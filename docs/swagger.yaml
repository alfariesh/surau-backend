        so clients must upsert idempotently by key and store server_time as the next
        cursor. saved_item_ids lists every current saved-item ID for delete reconciliation;
        when saved_items_full_resync=true the ID list was over the server cap (10000)
        and arrives empty — rebuild the local saved-items store by paging GET /me/saved-items
        instead of deleting by absence.
      operationId: sync-personal-data
      parameters:
      - description: RFC3339 cursor from the previous response's server_time
        example: "2026-06-11T00:00:00Z"
        in: query
        name: since
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.PersonalSyncSnapshot'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      security:
      - BearerAuth: []
      summary: Sync personal reader data
      tags:
      - me
