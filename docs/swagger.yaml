host: localhost:8080
info:
  contact: {}
  description: Surau classical book reader API
  title: Go Clean Template API
  version: "1.0"
paths:
  /admin/quran/missing-assets:
    get:
      description: Admin-only queue of missing Quran surah info, ayah translations,
        translation sources, and public audio.
      operationId: admin-list-missing-quran-assets
      parameters:
      - description: 'Target language: id or en; empty returns both'
        enum:
        - id
        - en
        in: query
        name: target_lang
        type: string
      - description: Asset type filter
        enum:
        - surah_info
        - ayah_translation
        - translation_source
        - audio_public
        in: query
        name: asset_type
        type: string
      - description: Surah ID
        in: query
        name: surah_id
        type: integer
      - default: 50
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.AdminMissingQuranAssets'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/v1.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: List missing Quran assets
      tags:
      - admin
  /admin/reader/missing-assets:
    get:
      description: Admin-only queue of missing kitab metadata, section translations,
        summaries, and audio for target languages id/en.
      operationId: admin-list-missing-reader-assets
      parameters:
      - description: 'Target language: id or en; empty returns both'
        enum:
        - id
        - en
        in: query
        name: target_lang
        type: string
      - description: Asset type filter
        enum:
        - book_metadata
        - category_metadata
        - author_metadata
        - section_translation
        - heading_summary
        - section_audio
        in: query
        name: asset_type
        type: string
      - description: Book ID
        in: query
        name: book_id
        type: integer
      - default: 50
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.AdminMissingReaderAssets'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/v1.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: List missing reader assets
      tags:
      - admin
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the current user's password and revoke older JWTs
      operationId: change-password
      parameters:
      - description: Current and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.ChangePassword'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.PasswordChanged'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send a password reset email when the account exists
      operationId: forgot-password
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.ForgotPassword'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/v1.Accepted'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/v1.Error'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/v1.Error'
      summary: Forgot password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and get JWT token
      operationId: login
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Token'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/v1.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user
      operationId: register
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.Register'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/v1.Error'
      summary: Register
      tags:
      - auth
  /auth/resend-verification:
    post:
      consumes:
      - application/json
      description: Resend email verification for an existing unverified user
      operationId: resend-verification
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.ResendVerification'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/v1.Accepted'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/v1.Error'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/v1.Error'
      summary: Resend verification email
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password using a one-time token
      operationId: reset-password
      parameters:
      - description: Password reset token and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.ResetPassword'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.PasswordReset'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: Reset password
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      description: Verify a user's email address using a one-time token
      operationId: verify-email
      parameters:
      - description: Email verification token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.VerifyEmail'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.EmailVerification'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: Verify email
      tags:
      - auth
  /authors:
    get:
      description: List authors with requested-language display metadata. Search matches
        Arabic and any catalog translation; display remains requested language or
        Arabic fallback.
      operationId: list-kitab-authors
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - default: 50
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      - default: id
        description: 'Language code: ar, id, or en'
        in: query
        name: lang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.AuthorList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: List kitab authors
      tags:
      - kitab
  /books:
    get:
      description: List published kitab catalog books. Book list responses keep existing
        fields, add localization metadata, and omit language_coverage; missing requested
        catalog translation falls back to Arabic metadata.
      operationId: list-kitab-books
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - description: Category ID
        in: query
        name: category_id
        type: integer
      - description: Author ID
        in: query
        name: author_id
        type: integer
      - description: Filter books that have imported content
        in: query
        name: has_content
        type: boolean
      - default: 50
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      - default: id
        description: 'Language code: ar, id, or en'
        in: query
        name: lang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.BookList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: List kitab books
      tags:
      - kitab
  /books/{book_id}:
    get:
      description: Get one published kitab book. Detail responses include language_coverage
        with translated, summarized, and audio section counts by language.
      operationId: get-kitab-book
      parameters:
      - description: Book ID
        in: path
        name: book_id
        required: true
        type: integer
      - default: id
        description: 'Language code: ar, id, or en'
        in: query
        name: lang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Book'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/v1.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Error'
      summary: Get kitab book
      tags:
      - kitab
  /books/{book_id}/headings:
    get:
      description: List raw Arabic heading tree rows for one published kitab.
      operationId: list-kitab-headings
      parameters:
      - description: Book ID
        in: path
        name: book_id
