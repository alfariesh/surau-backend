# Gitleaks config: default rules + allowlist for known-safe fixture values.
[extend]
useDefault = true

[allowlist]
description = "Known-safe test fixtures and documented non-secrets"
paths = [
  # Synthetic SQLite fixtures / test seeds carry fake credentials only.
  '''integration-test/.*_test\.go''',
  '''internal/.*_test\.go''',
]
regexTarget = "line"
regexes = [
  # Documented example DSNs with the placeholder password.
  '''myAwEsOm3pa55@w0rd''',
  # Empty documented placeholder in .env examples (A-3). The generic-api-key
  # rule bridges the empty assignment into the next line and reads it as a
  # secret; the real key only ever lives in gitignored .env, never here.
  '''MFA_ENCRYPTION_KEY=''',
]
