name: surau-backend-prod

services:
  db:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    image: ${APP_IMAGE:-surau-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:?set APP_NAME}
      APP_VERSION: ${APP_VERSION:?set APP_VERSION}
      APP_ENV: ${APP_ENV:-prod}
      HTTP_PORT: ${HTTP_PORT:-8080}
      HTTP_USE_PREFORK_MODE: ${HTTP_USE_PREFORK_MODE:-false}
      # Behind Cloudflare -> Caddy -> app: resolve the real visitor IP from
      # CF-Connecting-IP, trusting only the Docker gateway hop (Caddy).
      HTTP_PROXY_HEADER: ${HTTP_PROXY_HEADER:-CF-Connecting-IP}
      HTTP_TRUSTED_PROXIES: ${HTTP_TRUSTED_PROXIES:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}
      HTTP_COMPRESSION_ENABLED: ${HTTP_COMPRESSION_ENABLED:-true}
      # Browser origins of the web frontend; empty disables CORS (native
      # mobile apps do not need it).
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      SECURITY_HSTS_SECONDS: ${SECURITY_HSTS_SECONDS:-31536000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      PG_MAX_CONN_LIFETIME: ${PG_MAX_CONN_LIFETIME:-1h}
      PG_MAX_CONN_IDLE_TIME: ${PG_MAX_CONN_IDLE_TIME:-30m}
      PG_URL: ${PG_URL:?set PG_URL}
      JWT_TOKEN_EXPIRY: ${JWT_TOKEN_EXPIRY:-24h}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-surau-backend}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-surau-api}
      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_LOGIN_EMAIL_MAX: ${AUTH_RATE_LIMIT_LOGIN_EMAIL_MAX:-5}
      AUTH_RATE_LIMIT_LOGIN_EMAIL_WINDOW: ${AUTH_RATE_LIMIT_LOGIN_EMAIL_WINDOW:-5m}
      AUTH_RATE_LIMIT_LOGIN_IP_MAX: ${AUTH_RATE_LIMIT_LOGIN_IP_MAX:-30}
      AUTH_RATE_LIMIT_LOGIN_IP_WINDOW: ${AUTH_RATE_LIMIT_LOGIN_IP_WINDOW:-5m}
      AUTH_RATE_LIMIT_REGISTER_EMAIL_MAX: ${AUTH_RATE_LIMIT_REGISTER_EMAIL_MAX:-3}
      AUTH_RATE_LIMIT_REGISTER_EMAIL_WINDOW: ${AUTH_RATE_LIMIT_REGISTER_EMAIL_WINDOW:-1h}
      AUTH_RATE_LIMIT_REGISTER_IP_MAX: ${AUTH_RATE_LIMIT_REGISTER_IP_MAX:-10}
      AUTH_RATE_LIMIT_REGISTER_IP_WINDOW: ${AUTH_RATE_LIMIT_REGISTER_IP_WINDOW:-1h}
      AUTH_RATE_LIMIT_FORGOT_PASSWORD_EMAIL_MAX: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_EMAIL_MAX:-3}
      AUTH_RATE_LIMIT_FORGOT_PASSWORD_EMAIL_WINDOW: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_EMAIL_WINDOW:-1h}
      AUTH_RATE_LIMIT_FORGOT_PASSWORD_IP_MAX: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_IP_MAX:-20}
      AUTH_RATE_LIMIT_FORGOT_PASSWORD_IP_WINDOW: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_IP_WINDOW:-1h}
      AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_EMAIL_MAX: ${AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_EMAIL_MAX:-5}
      AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_EMAIL_WINDOW: ${AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_EMAIL_WINDOW:-15m}
      AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_IP_MAX: ${AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_IP_MAX:-30}
      AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_IP_WINDOW: ${AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_IP_WINDOW:-15m}
      AUTH_RATE_LIMIT_RESEND_VERIFICATION_EMAIL_MAX: ${AUTH_RATE_LIMIT_RESEND_VERIFICATION_EMAIL_MAX:-3}
      AUTH_RATE_LIMIT_RESEND_VERIFICATION_EMAIL_WINDOW: ${AUTH_RATE_LIMIT_RESEND_VERIFICATION_EMAIL_WINDOW:-1h}
      AUTH_RATE_LIMIT_RESEND_VERIFICATION_IP_MAX: ${AUTH_RATE_LIMIT_RESEND_VERIFICATION_IP_MAX:-20}
      AUTH_RATE_LIMIT_RESEND_VERIFICATION_IP_WINDOW: ${AUTH_RATE_LIMIT_RESEND_VERIFICATION_IP_WINDOW:-1h}
      AUTH_RATE_LIMIT_RESET_PASSWORD_TOKEN_MAX: ${AUTH_RATE_LIMIT_RESET_PASSWORD_TOKEN_MAX:-5}
      AUTH_RATE_LIMIT_RESET_PASSWORD_TOKEN_WINDOW: ${AUTH_RATE_LIMIT_RESET_PASSWORD_TOKEN_WINDOW:-15m}
      AUTH_RATE_LIMIT_RESET_PASSWORD_IP_MAX: ${AUTH_RATE_LIMIT_RESET_PASSWORD_IP_MAX:-30}
      AUTH_RATE_LIMIT_RESET_PASSWORD_IP_WINDOW: ${AUTH_RATE_LIMIT_RESET_PASSWORD_IP_WINDOW:-15m}
      AUTH_RATE_LIMIT_CHANGE_PASSWORD_USER_MAX: ${AUTH_RATE_LIMIT_CHANGE_PASSWORD_USER_MAX:-5}
      AUTH_RATE_LIMIT_CHANGE_PASSWORD_USER_WINDOW: ${AUTH_RATE_LIMIT_CHANGE_PASSWORD_USER_WINDOW:-5m}
      AUTH_RATE_LIMIT_CHANGE_PASSWORD_IP_MAX: ${AUTH_RATE_LIMIT_CHANGE_PASSWORD_IP_MAX:-30}
      AUTH_RATE_LIMIT_CHANGE_PASSWORD_IP_WINDOW: ${AUTH_RATE_LIMIT_CHANGE_PASSWORD_IP_WINDOW:-5m}
      AUTH_RATE_LIMIT_CHANGE_EMAIL_USER_MAX: ${AUTH_RATE_LIMIT_CHANGE_EMAIL_USER_MAX:-3}
      AUTH_RATE_LIMIT_CHANGE_EMAIL_USER_WINDOW: ${AUTH_RATE_LIMIT_CHANGE_EMAIL_USER_WINDOW:-1h}
      AUTH_RATE_LIMIT_CHANGE_EMAIL_IP_MAX: ${AUTH_RATE_LIMIT_CHANGE_EMAIL_IP_MAX:-10}
      AUTH_RATE_LIMIT_CHANGE_EMAIL_IP_WINDOW: ${AUTH_RATE_LIMIT_CHANGE_EMAIL_IP_WINDOW:-1h}
      AUTH_RATE_LIMIT_CHANGE_EMAIL_TOKEN_MAX: ${AUTH_RATE_LIMIT_CHANGE_EMAIL_TOKEN_MAX:-5}
      AUTH_RATE_LIMIT_CHANGE_EMAIL_TOKEN_WINDOW: ${AUTH_RATE_LIMIT_CHANGE_EMAIL_TOKEN_WINDOW:-15m}
      AUTH_RATE_LIMIT_DELETE_ACCOUNT_USER_MAX: ${AUTH_RATE_LIMIT_DELETE_ACCOUNT_USER_MAX:-3}
      AUTH_RATE_LIMIT_DELETE_ACCOUNT_USER_WINDOW: ${AUTH_RATE_LIMIT_DELETE_ACCOUNT_USER_WINDOW:-1h}
      AUTH_RATE_LIMIT_DELETE_ACCOUNT_IP_MAX: ${AUTH_RATE_LIMIT_DELETE_ACCOUNT_IP_MAX:-10}
      AUTH_RATE_LIMIT_DELETE_ACCOUNT_IP_WINDOW: ${AUTH_RATE_LIMIT_DELETE_ACCOUNT_IP_WINDOW:-1h}
      AUTH_EMAIL_NOTIFICATIONS_ENABLED: ${AUTH_EMAIL_NOTIFICATIONS_ENABLED:-true}
      AUTH_FAILED_LOGIN_EMAIL_COOLDOWN: ${AUTH_FAILED_LOGIN_EMAIL_COOLDOWN:-24h}
      AUTH_NEW_LOGIN_EMAIL_ENABLED: ${AUTH_NEW_LOGIN_EMAIL_ENABLED:-true}
      AUTH_FAILED_LOGIN_EMAIL_ENABLED: ${AUTH_FAILED_LOGIN_EMAIL_ENABLED:-true}
      AUTH_PASSWORD_CHANGED_EMAIL_ENABLED: ${AUTH_PASSWORD_CHANGED_EMAIL_ENABLED:-true}
      AUTH_EMAIL_VERIFIED_EMAIL_ENABLED: ${AUTH_EMAIL_VERIFIED_EMAIL_ENABLED:-true}
      AUTH_ROLE_CHANGED_EMAIL_ENABLED: ${AUTH_ROLE_CHANGED_EMAIL_ENABLED:-true}
      AUTH_EMAIL_CHANGED_EMAIL_ENABLED: ${AUTH_EMAIL_CHANGED_EMAIL_ENABLED:-true}
      AUTH_ACCOUNT_DELETED_EMAIL_ENABLED: ${AUTH_ACCOUNT_DELETED_EMAIL_ENABLED:-true}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-cloudflare}
      EMAIL_DISPATCH_INTERVAL: ${EMAIL_DISPATCH_INTERVAL:-15s}
      EMAIL_DISPATCH_BATCH: ${EMAIL_DISPATCH_BATCH:-20}
      CF_EMAIL_ACCOUNT_ID: ${CF_EMAIL_ACCOUNT_ID:?set CF_EMAIL_ACCOUNT_ID}
      CF_EMAIL_API_TOKEN: ${CF_EMAIL_API_TOKEN:?set CF_EMAIL_API_TOKEN}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:?set EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Surau}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_VERIFY_FRONTEND_URL: ${EMAIL_VERIFY_FRONTEND_URL:?set EMAIL_VERIFY_FRONTEND_URL}
      EMAIL_VERIFICATION_TTL: ${EMAIL_VERIFICATION_TTL:-24h}
      EMAIL_VERIFICATION_OTP_TTL: ${EMAIL_VERIFICATION_OTP_TTL:-10m}
      EMAIL_RESEND_COOLDOWN: ${EMAIL_RESEND_COOLDOWN:-1m}
      PASSWORD_RESET_FRONTEND_URL: ${PASSWORD_RESET_FRONTEND_URL:?set PASSWORD_RESET_FRONTEND_URL}
      PASSWORD_RESET_TTL: ${PASSWORD_RESET_TTL:-1h}
      PASSWORD_RESET_RESEND_COOLDOWN: ${PASSWORD_RESET_RESEND_COOLDOWN:-1m}
      EMAIL_CHANGE_FRONTEND_URL: ${EMAIL_CHANGE_FRONTEND_URL:?set EMAIL_CHANGE_FRONTEND_URL}
      EMAIL_CHANGE_TTL: ${EMAIL_CHANGE_TTL:-24h}
      EMAIL_CHANGE_OTP_TTL: ${EMAIL_CHANGE_OTP_TTL:-10m}
      EMAIL_CHANGE_RESEND_COOLDOWN: ${EMAIL_CHANGE_RESEND_COOLDOWN:-1m}
      EMAIL_UNSUBSCRIBE_FRONTEND_URL: ${EMAIL_UNSUBSCRIBE_FRONTEND_URL:-}
      EMAIL_UNSUBSCRIBE_PUBLIC_URL: ${EMAIL_UNSUBSCRIBE_PUBLIC_URL:-}
      EMAIL_UNSUBSCRIBE_TOKEN_KEY_ID: ${EMAIL_UNSUBSCRIBE_TOKEN_KEY_ID:-default}
      EMAIL_UNSUBSCRIBE_TOKEN_SECRET: ${EMAIL_UNSUBSCRIBE_TOKEN_SECRET:-}
      EMAIL_UNSUBSCRIBE_TOKEN_SECRETS: ${EMAIL_UNSUBSCRIBE_TOKEN_SECRETS:-}
      EMAIL_CLOUDFLARE_WEBHOOK_SECRET: ${EMAIL_CLOUDFLARE_WEBHOOK_SECRET:-}
      EMAIL_CLOUDFLARE_EVENT_POLLING_ENABLED: ${EMAIL_CLOUDFLARE_EVENT_POLLING_ENABLED:-false}
      EMAIL_CLOUDFLARE_ZONE_ID: ${EMAIL_CLOUDFLARE_ZONE_ID:-}
      EMAIL_CLOUDFLARE_ANALYTICS_API_TOKEN: ${EMAIL_CLOUDFLARE_ANALYTICS_API_TOKEN:-}
      EMAIL_CLOUDFLARE_EVENT_POLLING_INTERVAL: ${EMAIL_CLOUDFLARE_EVENT_POLLING_INTERVAL:-5m}
      EMAIL_CLOUDFLARE_EVENT_POLLING_LOOKBACK: ${EMAIL_CLOUDFLARE_EVENT_POLLING_LOOKBACK:-30m}
      EMAIL_CLOUDFLARE_EVENT_POLLING_LIMIT: ${EMAIL_CLOUDFLARE_EVENT_POLLING_LIMIT:-100}
      EMAIL_HTTP_TIMEOUT: ${EMAIL_HTTP_TIMEOUT:-10s}
      RAG_LLM_BASE_URL: ${RAG_LLM_BASE_URL:-https://ai.sumopod.com/v1}
      RAG_LLM_API_KEY: ${RAG_LLM_API_KEY:-}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-glm-5.1}
      RAG_LLM_TIMEOUT: ${RAG_LLM_TIMEOUT:-45s}
      RAG_LLM_MAX_TOKENS: ${RAG_LLM_MAX_TOKENS:-1400}
      RAG_LLM_TEMPERATURE: ${RAG_LLM_TEMPERATURE:-0.1}
      RAG_MAX_CONTEXT_PAGES: ${RAG_MAX_CONTEXT_PAGES:-8}
      RAG_TREE_FULL_MAX_NODES: ${RAG_TREE_FULL_MAX_NODES:-450}
      RAG_TREE_BLOCK_MAX_NODES: ${RAG_TREE_BLOCK_MAX_NODES:-120}
      RAG_TREE_BEAM_SIZE: ${RAG_TREE_BEAM_SIZE:-3}
      RAG_TREE_MAX_TURNS: ${RAG_TREE_MAX_TURNS:-6}
      RAG_TREE_MAX_BLOCKS_PER_TURN: ${RAG_TREE_MAX_BLOCKS_PER_TURN:-6}
      HTTP_BODY_LIMIT_BYTES: ${HTTP_BODY_LIMIT_BYTES:-4194304}
      # Realtime collaborative editing bridge (see docs/collab.md). When
      # enabled, also start the collab service: compose --profile collab up.
      COLLAB_ENABLED: ${COLLAB_ENABLED:-false}
      COLLAB_SERVICE_TOKEN: ${COLLAB_SERVICE_TOKEN:-}
      # OneSignal push notifications. Disabled unless ONESIGNAL_ENABLED=true and a REST API key are
      # set in .env.production; the App ID is public.
      ONESIGNAL_ENABLED: ${ONESIGNAL_ENABLED:-false}
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID:-}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY:-}
      ONESIGNAL_HTTP_TIMEOUT: ${ONESIGNAL_HTTP_TIMEOUT:-10s}
      ONESIGNAL_REMINDER_INTERVAL: ${ONESIGNAL_REMINDER_INTERVAL:-1h}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_BIND_ADDR:-127.0.0.1}:${APP_PUBLISHED_PORT:-8080}:8080"
    networks:
      - internal

  # Realtime collaborative editing websocket server (Yjs/Hocuspocus).
  # Opt-in: docker compose --profile collab up -d --build app collab
  # Caddy must proxy /collab to 127.0.0.1:8090 and return 404 for /internal
  # (see docs/collab.md, Operations).
  collab:
    image: ${COLLAB_IMAGE:-surau-collab:latest}
    build:
      context: ./collab-server
      dockerfile: Dockerfile
    profiles:
      - collab
    restart: unless-stopped
    environment:
      COLLAB_PORT: "8090"
      COLLAB_PG_URL: ${PG_URL:?set PG_URL}
      COLLAB_GO_API_URL: http://app:8080
      # No :? here — compose interpolates even profile-disabled services; the
      # Go app refuses to boot when COLLAB_ENABLED=true with a short token.
      COLLAB_SERVICE_TOKEN: ${COLLAB_SERVICE_TOKEN:-}
      COLLAB_DEBOUNCE_MS: ${COLLAB_DEBOUNCE_MS:-3000}
      COLLAB_DEBOUNCE_MAX_MS: ${COLLAB_DEBOUNCE_MAX_MS:-10000}
      COLLAB_TOKEN_GRACE_MS: ${COLLAB_TOKEN_GRACE_MS:-30000}
      COLLAB_LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/healthz').then((r) => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    ports:
      - "${COLLAB_BIND_ADDR:-127.0.0.1}:${COLLAB_PUBLISHED_PORT:-8090}:8090"
    networks:
      - internal

networks:
  internal:

volumes:
  db_data:
