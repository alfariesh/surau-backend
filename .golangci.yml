version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - wsl_v5
    - asciicheck
    - bodyclose
    - copyloopvar
    - cyclop
    - dogsled
    - dupl
    - durationcheck
    - err113
    - errcheck
    - errorlint
    - exhaustive
    - forbidigo
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - makezero
    - misspell
    - mnd
    - nakedret
    - nestif
    - nlreturn
    - noctx
    - nolintlint
    - paralleltest
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
      # Deferred/best-effort rollback after commit is the standard pgx idiom;
      # its error is meaningless once the tx finished.
      exclude-functions:
        - (github.com/jackc/pgx/v5.Tx).Rollback
    errorlint:
      errorf: true
    exhaustive:
      default-signifies-exhaustive: false
    funlen:
      lines: 65
      statements: 40
    gocognit:
      min-complexity: 15
    goconst:
      min-len: 2
      min-occurrences: 5
      ignore-tests: true
      # SQL column identifiers repeated across squirrel builders are not
      # magic strings worth hoisting.
      ignore-string-values:
        - "^(id|user_id)$"
    gocritic:
      disabled-checks:
        - dupImport
        - unnecessaryBlock
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 10
    misspell:
      locale: US
    nestif:
      min-complexity: 4
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - godot
          - paralleltest
        path: integration-test
      - linters:
          - godot
        path: internal
      # Size/duplication/magic-number linters add noise, not safety, in
      # table-driven tests; correctness linters (bodyclose, noctx, errcheck)
      # stay active for tests.
      - linters:
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - dupl
          - mnd
          - goconst
        path: _test\.go$
      # CLI tools print to stdout by design.
      - linters:
          - forbidigo
        path: ^cmd/
      # Importer validation errors are operator-facing console messages, never
      # matched programmatically with errors.Is, so dynamic error strings are fine.
      - linters:
          - err113
        path: internal/importer
    paths:
      - bin/
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - bin/
      - third_party$
      - builtin$
      - examples$
