<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Surau Reader</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=page-reader" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Books and table of contents">
        <header class="sidebar-header">
          <div>
            <p class="eyebrow">Surau Reader</p>
            <h1>Kitab</h1>
          </div>
          <div class="lang-switch" aria-label="Translation language">
            <button class="lang-button is-active" data-lang="id" type="button">ID</button>
            <button class="lang-button" data-lang="en" type="button">EN</button>
            <button class="lang-button" data-lang="ar" type="button">AR</button>
          </div>
        </header>

        <div class="search-row">
          <input id="bookSearch" type="search" placeholder="Cari kitab, penulis, kategori" autocomplete="off" />
          <button id="refreshBooks" class="icon-button" type="button" title="Refresh catalog" aria-label="Refresh catalog">↻</button>
        </div>

        <div id="bookList" class="book-list" aria-live="polite"></div>

        <div class="mode-switch" aria-label="Reader mode">
          <button class="mode-button is-active" data-mode="toc" type="button">Bab</button>
          <button class="mode-button" data-mode="page" type="button">Halaman</button>
        </div>

        <section id="tocPanel" class="toc-panel" aria-label="Table of contents">
          <div class="panel-heading">
            <h2>Daftar Bab</h2>
            <span id="tocCount" class="muted"></span>
          </div>
          <div id="tocTree" class="toc-tree"></div>
        </section>

        <section id="pagePanel" class="page-panel is-hidden" aria-label="Pages">
          <div class="panel-heading">
            <h2>Halaman</h2>
            <span id="pageCount" class="muted"></span>
          </div>
          <div id="pageList" class="page-list"></div>
          <div class="page-chunk-nav">
            <button id="prevPageChunk" class="chunk-button" type="button">←</button>
            <button id="nextPageChunk" class="chunk-button" type="button">→</button>
          </div>
        </section>
      </aside>

      <main class="reader" aria-live="polite">
        <div id="emptyState" class="empty-state">
          <p class="eyebrow">Reader</p>
          <h2>Pilih kitab untuk mulai membaca.</h2>
          <p>Prototype ini membaca endpoint public backend: catalog, TOC, dan section reader.</p>
        </div>

        <article id="readerArticle" class="reader-article is-hidden">
          <header class="reader-header">
            <div>
              <p id="bookMeta" class="eyebrow"></p>
              <h2 id="sectionTitle"></h2>
              <div id="breadcrumb" class="breadcrumb"></div>
            </div>
            <div class="reader-actions">
              <span id="translationBadge" class="status-badge"></span>
              <button id="toggleArabic" class="text-button" type="button">Arabic</button>
              <button id="toggleTranslation" class="text-button" type="button">Translation</button>
            </div>
          </header>

          <nav class="section-nav" aria-label="Section navigation">
            <button id="prevSection" class="nav-button" type="button">← Previous</button>
            <button id="nextSection" class="nav-button" type="button">Next →</button>
          </nav>

          <section id="translationPane" class="translation-pane">
            <div class="section-label">Translation</div>
            <div id="translationContent" class="translation-content"></div>
          </section>

          <section id="arabicPane" class="arabic-pane">
            <div class="section-label">Arabic Original</div>
            <div id="arabicContent" class="arabic-content" dir="rtl"></div>
          </section>

          <section id="childrenPane" class="children-pane">
            <div class="section-label">Subbab</div>
            <div id="childrenLinks" class="children-links"></div>
          </section>
        </article>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=page-reader" type="module"></script>
  </body>
</html>
