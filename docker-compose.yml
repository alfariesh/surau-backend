x-db-environment: &x-db-environment
  POSTGRES_SSL_MODE: "disable"
  POSTGRES_HOST: "db"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "db"
  POSTGRES_PASSWORD: "myAwEsOm3pa55@w0rd"
  POSTGRES_USER: "user"

x-backend-app-environment: &x-backend-app-environment
  GOMAXPROCS: "1"
  # App
  APP_NAME: "go-clean-template"
  APP_VERSION: "1.0.0"
  # HTTP settings
  HTTP_PORT: "8080"
  HTTP_USE_PREFORK_MODE: "false"
  HTTP_COMPRESSION_ENABLED: "true"
  # CORS / security headers (dev web frontends run on localhost:3000/3005)
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3005"
  SECURITY_HEADERS_ENABLED: "true"
  SECURITY_HSTS_SECONDS: "0"
  # Logger
  LOG_LEVEL: "debug"
  # PG
  PG_POOL_MAX: "10"
  PG_URL: "postgres://user:myAwEsOm3pa55@w0rd@db:5432/db"
  # Metrics
  METRICS_ENABLED: "true"
  # Swagger
  SWAGGER_ENABLED: "true"
  # JWT
  JWT_TOKEN_EXPIRY: "24h"
  JWT_SECRET: "dev-secret-change-me-32-bytes-minimum"
  JWT_ISSUER: "surau-backend"
  JWT_AUDIENCE: "surau-api"
  # Auth DB-backed rate limits
  AUTH_RATE_LIMIT_ENABLED: "true"
  AUTH_RATE_LIMIT_LOGIN_EMAIL_MAX: "5"
  AUTH_RATE_LIMIT_LOGIN_EMAIL_WINDOW: "5m"
  AUTH_RATE_LIMIT_LOGIN_IP_MAX: "30"
  AUTH_RATE_LIMIT_LOGIN_IP_WINDOW: "5m"
  AUTH_RATE_LIMIT_REGISTER_EMAIL_MAX: "3"
  AUTH_RATE_LIMIT_REGISTER_EMAIL_WINDOW: "1h"
  AUTH_RATE_LIMIT_REGISTER_IP_MAX: "10"
  AUTH_RATE_LIMIT_REGISTER_IP_WINDOW: "1h"
  AUTH_RATE_LIMIT_FORGOT_PASSWORD_EMAIL_MAX: "3"
  AUTH_RATE_LIMIT_FORGOT_PASSWORD_EMAIL_WINDOW: "1h"
  AUTH_RATE_LIMIT_FORGOT_PASSWORD_IP_MAX: "20"
  AUTH_RATE_LIMIT_FORGOT_PASSWORD_IP_WINDOW: "1h"
  AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_EMAIL_MAX: "5"
  AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_EMAIL_WINDOW: "15m"
  AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_IP_MAX: "30"
  AUTH_RATE_LIMIT_VERIFY_EMAIL_OTP_IP_WINDOW: "15m"
  AUTH_RATE_LIMIT_RESEND_VERIFICATION_EMAIL_MAX: "3"
  AUTH_RATE_LIMIT_RESEND_VERIFICATION_EMAIL_WINDOW: "1h"
  AUTH_RATE_LIMIT_RESEND_VERIFICATION_IP_MAX: "20"
  AUTH_RATE_LIMIT_RESEND_VERIFICATION_IP_WINDOW: "1h"
  AUTH_RATE_LIMIT_RESET_PASSWORD_TOKEN_MAX: "5"
  AUTH_RATE_LIMIT_RESET_PASSWORD_TOKEN_WINDOW: "15m"
  AUTH_RATE_LIMIT_RESET_PASSWORD_IP_MAX: "30"
  AUTH_RATE_LIMIT_RESET_PASSWORD_IP_WINDOW: "15m"
  AUTH_RATE_LIMIT_CHANGE_PASSWORD_USER_MAX: "5"
  AUTH_RATE_LIMIT_CHANGE_PASSWORD_USER_WINDOW: "5m"
  AUTH_RATE_LIMIT_CHANGE_PASSWORD_IP_MAX: "30"
  AUTH_RATE_LIMIT_CHANGE_PASSWORD_IP_WINDOW: "5m"
  AUTH_RATE_LIMIT_CHANGE_EMAIL_USER_MAX: "3"
  AUTH_RATE_LIMIT_CHANGE_EMAIL_USER_WINDOW: "1h"
  AUTH_RATE_LIMIT_CHANGE_EMAIL_IP_MAX: "10"
  AUTH_RATE_LIMIT_CHANGE_EMAIL_IP_WINDOW: "1h"
  AUTH_RATE_LIMIT_CHANGE_EMAIL_TOKEN_MAX: "5"
  AUTH_RATE_LIMIT_CHANGE_EMAIL_TOKEN_WINDOW: "15m"
  AUTH_RATE_LIMIT_DELETE_ACCOUNT_USER_MAX: "3"
  AUTH_RATE_LIMIT_DELETE_ACCOUNT_USER_WINDOW: "1h"
  AUTH_RATE_LIMIT_DELETE_ACCOUNT_IP_MAX: "10"
  AUTH_RATE_LIMIT_DELETE_ACCOUNT_IP_WINDOW: "1h"
  # Auth security email notifications
  AUTH_EMAIL_NOTIFICATIONS_ENABLED: "${AUTH_EMAIL_NOTIFICATIONS_ENABLED:-true}"
  AUTH_FAILED_LOGIN_EMAIL_COOLDOWN: "${AUTH_FAILED_LOGIN_EMAIL_COOLDOWN:-24h}"
  AUTH_NEW_LOGIN_EMAIL_ENABLED: "${AUTH_NEW_LOGIN_EMAIL_ENABLED:-true}"
  AUTH_FAILED_LOGIN_EMAIL_ENABLED: "${AUTH_FAILED_LOGIN_EMAIL_ENABLED:-true}"
  AUTH_PASSWORD_CHANGED_EMAIL_ENABLED: "${AUTH_PASSWORD_CHANGED_EMAIL_ENABLED:-true}"
  AUTH_EMAIL_VERIFIED_EMAIL_ENABLED: "${AUTH_EMAIL_VERIFIED_EMAIL_ENABLED:-true}"
  AUTH_ROLE_CHANGED_EMAIL_ENABLED: "${AUTH_ROLE_CHANGED_EMAIL_ENABLED:-true}"
  AUTH_EMAIL_CHANGED_EMAIL_ENABLED: "${AUTH_EMAIL_CHANGED_EMAIL_ENABLED:-true}"
  AUTH_ACCOUNT_DELETED_EMAIL_ENABLED: "${AUTH_ACCOUNT_DELETED_EMAIL_ENABLED:-true}"
  # Admin alerting for high-signal security events (refresh-token reuse).
  # Empty AUTH_ALERT_RECIPIENTS falls back to all admin-role users.
  AUTH_ALERT_ENABLED: "${AUTH_ALERT_ENABLED:-false}"
  AUTH_ALERT_INTERVAL: "${AUTH_ALERT_INTERVAL:-5m}"
  AUTH_ALERT_RECIPIENTS: "${AUTH_ALERT_RECIPIENTS:-}"
  # Collaborative editing bridge (collab-server -> app internal API)
  COLLAB_ENABLED: "${COLLAB_ENABLED:-true}"
  COLLAB_SERVICE_TOKEN: "${COLLAB_SERVICE_TOKEN:-dev-collab-service-token-32-bytes-min}"
  # Email / Cloudflare Email Service
  EMAIL_DELIVERY_MODE: "${EMAIL_DELIVERY_MODE:-log}"
  CF_EMAIL_ACCOUNT_ID: "${CF_EMAIL_ACCOUNT_ID:-dev-cloudflare-account-id}"
  CF_EMAIL_API_TOKEN: "${CF_EMAIL_API_TOKEN:-dev-cloudflare-api-token}"
  EMAIL_FROM_ADDRESS: "${EMAIL_FROM_ADDRESS:-noreply@example.com}"
  EMAIL_FROM_NAME: "${EMAIL_FROM_NAME:-Surau}"
  EMAIL_REPLY_TO: "${EMAIL_REPLY_TO:-}"
  EMAIL_VERIFY_FRONTEND_URL: "${EMAIL_VERIFY_FRONTEND_URL:-http://localhost:3005/verify-email}"
  EMAIL_VERIFICATION_TTL: "${EMAIL_VERIFICATION_TTL:-24h}"
  EMAIL_VERIFICATION_OTP_TTL: "${EMAIL_VERIFICATION_OTP_TTL:-10m}"
  EMAIL_RESEND_COOLDOWN: "${EMAIL_RESEND_COOLDOWN:-1m}"
  PASSWORD_RESET_FRONTEND_URL: "${PASSWORD_RESET_FRONTEND_URL:-http://localhost:3005/reset-password}"
  PASSWORD_RESET_TTL: "${PASSWORD_RESET_TTL:-1h}"
  PASSWORD_RESET_RESEND_COOLDOWN: "${PASSWORD_RESET_RESEND_COOLDOWN:-1m}"
  EMAIL_CHANGE_FRONTEND_URL: "${EMAIL_CHANGE_FRONTEND_URL:-http://localhost:3005/change-email}"
  EMAIL_CHANGE_TTL: "${EMAIL_CHANGE_TTL:-24h}"
  EMAIL_CHANGE_OTP_TTL: "${EMAIL_CHANGE_OTP_TTL:-10m}"
  EMAIL_CHANGE_RESEND_COOLDOWN: "${EMAIL_CHANGE_RESEND_COOLDOWN:-1m}"
  EMAIL_UNSUBSCRIBE_TOKEN_KEY_ID: "${EMAIL_UNSUBSCRIBE_TOKEN_KEY_ID:-default}"
  EMAIL_UNSUBSCRIBE_TOKEN_SECRET: "${EMAIL_UNSUBSCRIBE_TOKEN_SECRET:-}"
  EMAIL_UNSUBSCRIBE_TOKEN_SECRETS: "${EMAIL_UNSUBSCRIBE_TOKEN_SECRETS:-}"
  EMAIL_CLOUDFLARE_WEBHOOK_SECRET: "${EMAIL_CLOUDFLARE_WEBHOOK_SECRET:-}"
  EMAIL_HTTP_TIMEOUT: "${EMAIL_HTTP_TIMEOUT:-10s}"
  EMAIL_DISPATCH_INTERVAL: "${EMAIL_DISPATCH_INTERVAL:-15s}"
  EMAIL_DISPATCH_BATCH: "${EMAIL_DISPATCH_BATCH:-20}"


services:
  db:
    container_name: db
    image: postgres:18.4-alpine
    environment:
      <<: *x-db-environment
    volumes:
      # postgres:18 images keep PGDATA under /var/lib/postgresql (the image's
      # volume root). Mounting the old /18/data path left data on an anonymous
      # volume that vanished on every container recreate.
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      app_network:
        aliases:
          - db.lvh.me

  app:
    container_name: app
    platform: linux/amd64
    pid: "host"
    build:
      context: .
    environment:
      <<: *x-backend-app-environment
    ports:
      - "8080:8080"
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: '2Gb'
        reservations:
          cpus: '0.60'
          memory: '1Gb'
    networks:
      app_network:
        aliases:
          - app.lvh.me

  collab:
    container_name: collab
    build:
      context: ./collab-server
    environment:
      COLLAB_PORT: "8090"
      COLLAB_PG_URL: "postgres://user:myAwEsOm3pa55@w0rd@db:5432/db"
      COLLAB_GO_API_URL: "http://app:8080"
      COLLAB_SERVICE_TOKEN: "${COLLAB_SERVICE_TOKEN:-dev-collab-service-token-32-bytes-min}"
      COLLAB_DEBOUNCE_MS: "3000"
      COLLAB_DEBOUNCE_MAX_MS: "10000"
      COLLAB_TOKEN_GRACE_MS: "30000"
      COLLAB_LOG_LEVEL: "info"
    ports:
      - "8090:8090"
    depends_on:
      - db
      - app
    networks:
      app_network:
        aliases:
          - collab.lvh.me

  nginx:
    container_name: nginx
    image: nginx:1.31.2-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - app
      - collab
    networks:
      app_network:
        aliases:
          - nginx.lvh.me


networks:
  app_network:
    external: false


volumes:
  db_data:
