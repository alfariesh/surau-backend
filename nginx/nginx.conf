http
{
    map $http_upgrade $connection_upgrade
    {
        default upgrade;
        '' close;
    }

    upstream app
    {
        server app:8080;
    }

    upstream collab
    {
        server collab:8090;
    }

    server
    {
        listen 80;
        server_name app.lvh.me;

        # The internal service-to-service API is for the docker network only.
        location /internal
        {
            return 404;
        }

        # Prometheus metrics stay private: scraping happens on the docker
        # network, never through the public proxy.
        location /metrics
        {
            return 404;
        }

        # Realtime collaborative editing websocket (Hocuspocus). The /collab
        # prefix is stripped before proxying (the collab-server serves the
        # websocket and /healthz at its root), matching the prod Caddy config.
        location /collab
        {
            rewrite ^/collab/?(.*)$ /$1 break;
            proxy_pass http://collab;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        location /
        {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

}


events
{
    worker_connections 1024;
}
