          - generic [ref=e104]:
            - paragraph [ref=e105]:
              - strong [ref=e106]: "Bab Pertama: Hukum Puasa"
            - paragraph [ref=e107]: "Puasa Ramadan adalah kewajiban yang ditetapkan berdasarkan Kitab Allah Ta'ala, Sunah Rasulullah shallallahu 'alaihi wa sallam, dan ijma' kaum muslimin. Allah Ta'ala berfirman:"
            - blockquote [ref=e108]:
              - paragraph [ref=e109]: "\"Wahai orang-orang yang beriman, diwajibkan atas kamu berpuasa sebagaimana diwajibkan atas orang-orang sebelum kamu agar kamu bertakwa. (Yaitu) beberapa hari tertentu. Maka barangsiapa di antara kamu sakit atau dalam perjalanan (lalu tidak berpuasa), maka (wajib mengganti) sebanyak hari (yang ditinggalkan itu) pada hari-hari yang lain. Dan bagi orang yang berat menjalankannya, wajib membayar fidyah, yaitu memberi makan seorang miskin. Tetapi barangsiapa dengan kerelaan hati mengerjakan kebajikan, maka itu lebih baik baginya. Dan puasamu itu lebih baik bagimu jika kamu mengetahui. Bulan Ramadan adalah (bulan) yang di dalamnya diturunkan Al-Qur'an sebagai petunjuk bagi manusia dan penjelasan-penjelasan mengenai petunjuk itu serta pembeda (antara yang benar dan yang batil). Karena itu, barangsiapa di antara kamu hadir (di negeri tempat tinggalnya) pada bulan itu, maka hendaklah ia berpuasa pada bulan itu. Dan barangsiapa sakit atau dalam perjalanan (lalu tidak berpuasa), maka (wajib mengganti) sebanyak hari (yang ditinggalkannya) pada hari-hari yang lain. Allah menghendaki kemudahan bagimu, dan tidak menghendaki kesukaran bagimu. Hendaklah kamu mencukupkan bilangannya dan mengagungkan Allah atas petunjuk-Nya yang diberikan kepadamu, agar kamu bersyukur.\" (QS. Al-Baqarah: 183-185)"
            - paragraph [ref=e110]: "Nabi shallallahu 'alaihi wa sallam bersabda:"
            - blockquote [ref=e111]:
              - paragraph [ref=e112]: "\"Islam dibangun di atas lima perkara: bersaksi bahwa tidak ada tuhan selain Allah dan bahwa Muhammad adalah utusan Allah, mendirikan shalat, menunaikan zakat, haji ke Baitullah, dan puasa Ramadan.\" (Muttafaq 'alaih) (1)"
            - paragraph [ref=e113]: "Dalam riwayat Muslim: \"...dan puasa Ramadan serta haji ke Baitullah.\" (2)"
            - paragraph [ref=e114]: Kaum muslimin telah sepakat tentang kewajiban puasa Ramadan. Barangsiapa mengingkari kewajiban puasa Ramadan, maka ia adalah murtad dan kafir. Ia diminta bertobat; jika bertobat dan mengakui kewajibannya, maka itu baik; jika tidak, ia dibunuh sebagai orang kafir.
            - paragraph [ref=e115]: Puasa Ramadan diwajibkan pada tahun kedua Hijriah. Rasulullah shallallahu 'alaihi wa sallam berpuasa selama sembilan kali Ramadan. Puasa adalah kewajiban bagi setiap muslim yang balig dan berakal.
            - paragraph [ref=e116]: "--- (1) HR. Bukhari, Kitab al-Iman, no. 8; Muslim, Kitab al-Iman, no. 16. (2) HR. Muslim, Kitab al-Iman, no. 16."
            - paragraph [ref=e117]: Puasa tidak wajib bagi orang kafir, dan tidak diterima darinya hingga ia masuk Islam. Puasa tidak wajib bagi anak kecil hingga ia balig. Balignya anak laki-laki ditandai dengan sempurnanya usia lima belas tahun, tumbuhnya rambut kemaluan, atau keluarnya mani (ihtilam atau lainnya). Sedangkan anak perempuan ditandai dengan haid. Apabila pada anak kecil telah didapati salah satu tanda tersebut, maka ia telah balig. Namun, anak kecil diperintahkan berpuasa jika mampu tanpa membahayakan dirinya, agar ia terbiasa dan akrab dengannya. Puasa tidak wajib bagi orang yang kehilangan akal karena gila, perubahan otak, atau sejenisnya. Dengan demikian, jika seseorang sudah tua namun pikun (tidak dapat membedakan), maka tidak ada kewajiban puasa baginya dan tidak ada kewajiban memberi makan (fidyah).
        - generic [ref=e118]:
          - generic [ref=e119]: Arabic Original
          - generic [ref=e120]:
            - generic [ref=e121]: "الفصل الأول: في حكم الصيام"
            - text: ". الفصل الثاني: في حِكَمه وفوائده. الفصل الثالث: في حكم صيام المريض والمسافر. الفصل الرابع: في مفسدات الصوم وهي المفطرات. الفصل الخامس: في التروايح. الفصل السادس: في الزكاة وفوائدها. الفصل السابع: في أهل الزكاة. الفصل الثامن: في زكاة الفطر. الفصل الأول في حكم الصيام صيام رمضان فريضة ثابتة بكتاب الله تعالى وسُنَّة رسوله صلى الله عليه وسلّم، وإجماع المسلمين؛ قال الله تعالى ـ: {يأَيُّهَا الَّذِينَءَامَنُواْ كُتِبَ عَلَيْكُمُ الصِّيَامُ كَمَا كُتِبَ عَلَى الَّذِينَ مِن قَبْلِكُمْ لَعَلَّكُمْ تَتَّقُونَ * أَيَّامًا مَّعْدُودَاتٍ فَمَن كَانَ مِنكُم مَّرِيضًا أَوْ عَلَى سَفَرٍ فَعِدَّةٌ مِّنْ أَيَّامٍ أُخَرَ وَعَلَى الَّذِينَ يُطِيقُونَهُ فِدْيَةٌ طَعَامُ مِسْكِينٍ فَمَن تَطَوَّعَ خَيْرًا فَهُوَ خَيْرٌ لَّهُ وَأَن تَصُومُواْ خَيْرٌ لَّكُمْ إِن كُنتُمْ تَعْلَمُونَ * شَهْرُ رَمَضَانَ الَّذِى أُنزِلَ فِيهِ الْقُرْآنُ هُدًى لِّلنَّاسِ وَبَيِّنَاتٍ مِّنَ الْهُدَى وَالْفُرْقَانِ فَمَن شَهِدَ مِنكُمُ الشَّهْرَ فَلْيَصُمْهُ وَمَن كَانَ مَرِيضًا أَوْ عَلَى سَفَرٍ فَعِدَّةٌ مِّنْ أَيَّامٍ أُخَرَ يُرِيدُ اللَّهُ بِكُمُ الْيُسْرَ وَلاَ يُرِيدُ بِكُمُ الْعُسْرَ وَلِتُكْمِلُواْ الْعِدَّةَ وَلِتُكَبِّرُواْ اللَّهَ عَلَى مَا هَدَاكُمْ وَلَعَلَّكُمْ تَشْكُرُونَ} {البقرة ١٨٣-١٨٥} . وقال النبي صلى الله عليه وسلّم: «بُني الإسلام على خمس: شهادة أن لا إله إلا الله وأن محمداً رسول الله، وإقام الصلاة، وإيتاء الزكاة، وحج البيت، وصوم رمضان» . متفق عليه (١) . وفي رواية لمسلم: «وصوم رمضان، وحج البيت» (٢) . وأجمع المسلمون على فريضة صوم رمضان، فمن أنكر فريضة صوم رمضان فهو مرتد كافر، يُستتاب فإن تاب وأقر بفريضته فذاك وإلا قُتِل كافراً. وفُرض صومُ رمضان في السنة الثانية من الهجرة، فصام رسول الله صلى الله عليه وسلّم، تسع رمضانات، والصوم فريضة على كل مسلم بالغ عاقل. _________ (١) صحيح البخاري الإيمان (٨) وصحيح مسلم كتاب الإيمان (١٦) . (٢) صحيح مسلم كتاب الإيمان (١٦) . فلا يجب الصوم على الكافر، ولا يُقبَل منه حتى يُسلِم، ولا يجب الصوم على الصغير حتى يبلغ، ويحصل بلوغه بتمام خمس عشرة سنة، أو نبات عانته، أو نزول المني منه بالاحتلام أو غيره، وتزيد الأنثى بالحيض، فمتى حصل للصغير أحد هذه الأشياء فقد بلغ لكن يؤمر الصغير بالصوم إذا أطاق بلا ضرر عليه ليعتاده ويألفه. ولا يجب الصوم على فاقد العقل بجنون أو تغير دماغ أو نحوه، وعلى هذا فإذا كان الإنسان كبيراً يهذي ولا يميز فلا صيام عليه ولا إطعام."
