name: Integration Soak
# F1-E AC-1 evidence: the integration suite must pass N consecutive cold-boot
# runs with NO retry. Dispatched manually (post-merge) — a red run here means
# the de-flake regressed and the single CI retry (F1-D8) is hiding something.
on:
  workflow_dispatch:
    inputs:
      runs:
        description: Number of consecutive runs
        required: false
        default: "10"

jobs:
  soak:
    name: runner / tests / integration-soak
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v6
      - name: Soak — consecutive integration runs, no retry, fail fast
        run: |
          set -euo pipefail
          total="${{ github.event.inputs.runs }}"
          echo "### Integration soak — ${total} runs, no retry (F1-E AC-1)" >> "$GITHUB_STEP_SUMMARY"
          for i in $(seq 1 "$total"); do
            start="$(date +%s)"
            echo "=== soak run ${i}/${total} ==="
            make compose-up-integration-test
            # Full reset (incl. volumes) so every run proves the cold-boot path.
            docker compose -f docker-compose.yml -f docker-compose-integration-test.yml down --remove-orphans -v || true
            echo "- run ${i}/${total}: ✅ in $(( $(date +%s) - start ))s" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**${total}/${total} hijau tanpa retry.**" >> "$GITHUB_STEP_SUMMARY"
      - name: Telegram alarm — soak failed
        if: failure()
        uses: ./.github/actions/telegram-notify
        with:
          message: >-
            ❌ Integration soak GAGAL (suite tidak lulus berturut tanpa retry — de-flake regresi):
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
