name: RAG Eval Smoke
# F1-D9: scheduled + non-gating by construction (never runs on pull_request,
# so it can never block a merge — the full eval gate belongs to Fase 7). It
# drives the black-box harness against dev-api, which already has the seeded
# corpus and a configured LLM; a failure alarms Telegram so RAG regressions
# surface early instead of waiting for a user.
on:
  schedule:
    # Sunday 19:00 UTC = Monday 02:00 WIB, weekly.
    - cron: "0 19 * * 0"
  workflow_dispatch: {}

jobs:
  smoke:
    name: runner / rag-eval-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version: 1.26.5
      - name: Check the eval corpus exists on dev
        id: corpus
        # The smoke cases pin Shamela book IDs; dev currently carries only a
        # sample subset, so run the harness only once those books are imported
        # (data task) — a skip is reported loudly instead of a permanent red.
        run: |
          set -euo pipefail
          missing=""
          for book in 797 7312 12876; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "https://dev-api.surau.org/v1/books/${book}")"
            [ "$code" = "200" ] || missing="${missing} ${book}"
          done
          if [ -n "$missing" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::rag-eval smoke SKIPPED — eval books not on dev-api yet:${missing}"
            {
              echo "### RAG eval smoke: DILEWATI"
              echo ""
              echo "Buku korpus eval belum ada di dev-api:${missing} — impor dulu (tugas data), lalu smoke ini otomatis berjalan penuh."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Telegram notice — smoke skipped (corpus missing)
        if: steps.corpus.outputs.present == 'false'
        uses: ./.github/actions/telegram-notify
        with:
          message: >-
            ⚠️ RAG eval smoke DILEWATI: buku korpus eval (797/7312/12876) belum diimpor ke dev-api.
            Smoke berjalan penuh otomatis setelah impor:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Run rag-eval smoke against dev-api
        if: steps.corpus.outputs.present == 'true'
        env:
          RAG_EVAL_SERVICE_TOKEN: ${{ secrets.RAG_EVAL_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          go run ./cmd/rag-eval -base-url https://dev-api.surau.org \
            -cases eval/bookrag_smoke.jsonl -output json -verbose | tee rag-eval.json
      - name: Publish result summary
        if: always() && steps.corpus.outputs.present == 'true'
        run: |
          set -euo pipefail
          {
            echo "### RAG eval smoke (non-gating, F1-D9)"
            echo ""
            echo '```json'
            cat rag-eval.json 2>/dev/null || echo '"no output produced"'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Telegram alarm — RAG smoke failed
        if: failure()
        uses: ./.github/actions/telegram-notify
        with:
          message: >-
            ❌ RAG eval smoke GAGAL terhadap dev-api (regresi RAG atau dev-api bermasalah):
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
