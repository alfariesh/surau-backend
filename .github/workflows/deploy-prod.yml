name: Deploy Prod

# Release deploy: pushing an api-vX.Y.Z tag auto-deploys that exact commit to the
# PROD VPS (api.surau.org) and cuts a GitHub Release. Prod only changes when you tag.
on:
  push:
    tags:
      - 'api-v*'

concurrency:
  group: surau-prod-operations
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy backend to PROD VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: prod
    env:
      VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
      VPS_USER: ${{ secrets.PROD_VPS_USER }}
      VPS_DEPLOY_PATH: ${{ secrets.PROD_VPS_DEPLOY_PATH }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.PROD_VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_KNOWN_HOSTS: ${{ secrets.PROD_VPS_SSH_KNOWN_HOSTS }}
      DEPLOY_TAG: ${{ github.ref_name }}
    steps:
      - name: Deploy tag over SSH
        shell: bash
        run: |
          set -euo pipefail

          : "${VPS_HOST:?Set the PROD_VPS_HOST repository secret}"
          : "${VPS_USER:?Set the PROD_VPS_USER repository secret}"
          : "${VPS_DEPLOY_PATH:?Set the PROD_VPS_DEPLOY_PATH repository secret}"
          : "${VPS_SSH_PRIVATE_KEY:?Set the PROD_VPS_SSH_PRIVATE_KEY repository secret}"
          : "${VPS_SSH_KNOWN_HOSTS:?Set the pinned PROD_VPS_SSH_KNOWN_HOSTS secret}"
          umask 077

          # Version is the tag without the api-v prefix, e.g. api-v0.8.0 -> 0.8.0.
          APP_VERSION="${DEPLOY_TAG#api-v}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/surau_deploy_key
          chmod 600 ~/.ssh/surau_deploy_key
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh -i ~/.ssh/surau_deploy_key -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=30 -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 -o TCPKeepAlive=yes \
            "$VPS_USER@$VPS_HOST" \
            "DEPLOY_TAG='$DEPLOY_TAG' DEPLOY_PATH='$VPS_DEPLOY_PATH' APP_VERSION='$APP_VERSION' APP_ENV='prod' bash -s" <<'REMOTE'
          set -euo pipefail
          export APP_VERSION APP_ENV

          cd "$DEPLOY_PATH"
          # Once A-4 is installed, reject a release before checkout can replace
          # the rotation runner/Compose file or a build can retag APP_IMAGE.
          # The first A-4 release safely skips this because its predecessor has
          # no deploy guard yet; the post-build guard below still protects it.
          if [ -x ops/auth/assert-jwt-deploy-safe.sh ]; then
            A4_PREDEPLOY_MODE="$(ENV_FILE=.env.production APP_ENV=prod \
              ops/auth/assert-jwt-deploy-safe.sh)"
            case "$A4_PREDEPLOY_MODE" in
              safe|capture-legacy) ;;
              *) echo "A-4 pre-deploy guard returned an invalid mode" >&2; exit 1 ;;
            esac
          fi
          # Deploy the exact tagged commit (detached HEAD), not a branch tip.
          git fetch --tags --force origin
          git checkout --force "refs/tags/$DEPLOY_TAG"

          # A production host must never inherit the image's post-K-1 unit
          # default before an explicit release rollout. The first K-1 release
          # is pinned to legacy; later releases preserve the operator's flag.
          if ! grep -q '^RAG_BOOK_CITATION_MODE=' .env.production; then
            printf '%s\n' 'RAG_BOOK_CITATION_MODE=legacy' >> .env.production
          fi

          PROFILE_ARGS=()
          SERVICES=(app)
          COLLAB_CHECK=""
          if grep -q '^COLLAB_ENABLED=true' .env.production; then
            PROFILE_ARGS=(--profile collab)
            SERVICES+=(collab)
            COLLAB_CHECK="http://127.0.0.1:8090/healthz"
            # Materialize the existing production owner DSN and collab token as
            # root-owned files before Compose recreates the collab container.
            # Production intentionally stops at prepare: the DEV-specific DB
            # role cutover remains an explicit, separately reviewed operation.
            ENV_FILE=.env.production COMPOSE_FILE=docker-compose.prod.yml \
              ops/service-identities/collab-dev-credentials.sh prepare
          fi

          # Snapshot the DB before the new image auto-migrates on boot, so a bad
          # migration can be rolled back. Encrypted + uploaded to R2 with 7-day
          # retention (E6); dump failure aborts the deploy ("no backup, no deploy"),
          # R2-upload failure alarms Telegram but lets the deploy continue.
          # </dev/null is load-bearing: the script uses `exec -T`, which otherwise
          # consumes this script's stdin (the ssh heredoc), swallowing every
          # command after the snapshot.
          echo "Snapshotting DB before migrate..."
          sudo /usr/local/sbin/surau-predeploy-snapshot </dev/null

          # Bound build-cache growth so a full disk can't fail the build.
          sudo docker builder prune -f --filter 'until=72h' >/dev/null 2>&1 || true

          # Build explicitly so a build error (e.g. disk full) fails the deploy loudly,
          # then --force-recreate so the freshly built image AND the new APP_VERSION are
          # guaranteed to run. A plain `up --build` can rebuild yet leave the OLD
          # container in place, which the health check would then pass — masking a
          # non-deploy.
          sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" build "${SERVICES[@]}"
          # A-4 one-time bridge. The exact legacy signer is copied into the
          # root-owned reloadable keyset before the first A-4 process starts;
          # capture a fresh no-kid canary at the last possible moment so the
          # subsequent PROD Worker-first activation retains its full lifetime.
          # Retries validate the existing file without replacing it.
          ENV_FILE=.env.production APP_ENV=prod ops/auth/bootstrap-jwt-keyset.sh
          A4_BRIDGE_MODE="$(ENV_FILE=.env.production APP_ENV=prod \
            ops/auth/assert-jwt-deploy-safe.sh)"
          if [ "$A4_BRIDGE_MODE" = capture-legacy ]; then
            LEGACY_APP_VERSION="$(curl -fsS http://127.0.0.1:8080/version \
              | sed -n 's/.*"version":"\([A-Za-z0-9._-]*\)".*/\1/p')"
            if [[ ! "$LEGACY_APP_VERSION" =~ ^[A-Za-z0-9._-]{1,64}$ ]]; then
              echo "A-4 bridge could not identify the living legacy app version" >&2
              exit 1
            fi
            ENV_FILE=.env.production COMPOSE_FILE=docker-compose.prod.yml \
              APP_ENV=prod EXPECTED_VERSION="$LEGACY_APP_VERSION" \
              ops/auth/rotate-jwt-keyset.sh capture-legacy </dev/null
          fi
          sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" up -d --force-recreate "${SERVICES[@]}"
          candidate_healthy=false
          for attempt in {1..30}; do
            # Assert /version reports the tag we just deployed, so a container that did
            # not roll over is caught instead of looking healthy.
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null &&
               curl -fsS http://127.0.0.1:8080/readyz >/dev/null &&
               curl -fsS http://127.0.0.1:8080/version | grep -q "\"version\":\"$APP_VERSION\"" &&
               { [ -z "$COLLAB_CHECK" ] || curl -fsS "$COLLAB_CHECK" >/dev/null; }; then
              candidate_healthy=true
              break
            fi

            sleep 2
          done

          if [ "$candidate_healthy" != true ]; then
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" logs --tail=120 "${SERVICES[@]}"
            exit 1
          fi

          # Q-2 production rollout/recovery. The frozen QPC job only fills
          # NULL page metadata and refuses conflicting existing assignments;
          # the Citable Unit reconcile then refreshes page projections without
          # re-minting identities. Both commands are resumable and idempotent.
          # Keep stdin detached so neither docker exec can consume the SSH
          # heredoc and silently skip the gates that follow.
          echo "Reconciling Quran page navigation and Citable Units..."
          sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
            exec -T app /backfill -job=quran-page-navigation-v1 -chunk-size=500 -sleep=0s -restart </dev/null
          sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
            exec -T app /backfill -job=citable-units-quran -chunk-size=1 -sleep=0s -restart </dev/null

          # A release is not healthy merely because the route exists. Prove
          # the complete QPC Hafs v1 corpus before exposing success: all 6,236
          # ayahs assigned, exactly pages 1..604, canonical first/last edges.
          quran_page_stats="$(
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
              exec -T db sh -c \
                'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -At -F "|" -c "
                  SELECT count(*),
                         count(page_number),
                         count(DISTINCT page_number),
                         min(page_number),
                         max(page_number),
                         count(*) FILTER (WHERE page_number NOT BETWEEN 1 AND 604),
                         count(*) FILTER (WHERE page_number = 1),
                         string_agg(ayah_key, chr(44) ORDER BY surah_id, ayah_number)
                           FILTER (WHERE page_number = 1),
                         (SELECT ayah_key FROM quran_ayahs
                           WHERE page_number = 604
                           ORDER BY surah_id DESC, ayah_number DESC LIMIT 1)
                  FROM quran_ayahs"' </dev/null
          )"
          IFS='|' read -r total_ayahs assigned_ayahs distinct_pages first_page last_page \
            out_of_range page_one_count page_one_keys final_ayah <<<"$quran_page_stats"
          test "$total_ayahs" = 6236
          test "$assigned_ayahs" = 6236
          test "$distinct_pages" = 604
          test "$first_page" = 1
          test "$last_page" = 604
          test "$out_of_range" = 0
          test "$page_one_count" = 7
          test "$page_one_keys" = '1:1,1:2,1:3,1:4,1:5,1:6,1:7'
          test "$final_ayah" = '114:6'

          # Exercise the same public contracts the frontend uses, against the
          # origin that was just deployed. Current unit identity proves the
          # second reconcile completed rather than only filling page numbers.
          curl -fsS 'http://127.0.0.1:8080/v1/quran/pages/1/ayahs?view=reader_minimal' \
            | grep -Eq '"primary_unit_id":"[0-9a-f-]+"'
          quran_page_resolution="$(curl -fsS \
            'http://127.0.0.1:8080/v1/anchors/resolve?page_number=1')"
          grep -q '"target_type":"quran_ayah"' <<<"$quran_page_resolution"
          grep -Eq '"primary_unit_id":"[0-9a-f-]+"' <<<"$quran_page_resolution"
          grep -Eq '"primary_unit_anchor":"quran/[0-9]+:[0-9]+/u/1"' \
            <<<"$quran_page_resolution"
          curl -fsS http://127.0.0.1:8080/readyz >/dev/null

          # Reclaim old images ONLY after the release, data gates, and reader
          # contracts are all proven healthy.
          sudo docker image prune -f
          REMOTE

      - name: Verify public production contracts
        shell: bash
        run: |
          set -euo pipefail

          APP_VERSION="${DEPLOY_TAG#api-v}"
          for attempt in {1..12}; do
            if curl -fsS --max-time 10 https://api.surau.org/healthz >/dev/null &&
               curl -fsS --max-time 10 https://api.surau.org/readyz >/dev/null &&
               curl -fsS --max-time 10 https://api.surau.org/version \
                 | grep -q "\"version\":\"$APP_VERSION\"" &&
               curl -fsS --max-time 15 \
                 'https://api.surau.org/v1/quran/pages/1/ayahs?view=reader_minimal' \
                 | grep -Eq '"primary_unit_id":"[0-9a-f-]+"' &&
               curl -fsS --max-time 15 \
                 'https://api.surau.org/v1/anchors/resolve?page_number=1' \
                 | grep -Eq '"primary_unit_anchor":"quran/[0-9]+:[0-9]+/u/1"'; then
              exit 0
            fi

            sleep 5
          done

          echo "public production contracts did not converge after Q-2 rollout" >&2
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
