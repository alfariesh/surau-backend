name: Deploy Dev

# Trunk deploy: every merge to main auto-deploys to the DEV VPS (dev-api.surau.org).
# Prod is deployed separately from api-v* tags (see deploy-prod.yml).
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      book_rag_citation_mode:
        description: Preserve or explicitly move the dev Book-RAG citation rollout flag
        required: true
        type: choice
        default: preserve
        options:
          - preserve
          - legacy
          - dual
          - unit
          - default

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to DEV VPS
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      VPS_HOST: ${{ secrets.DEV_VPS_HOST }}
      VPS_USER: ${{ secrets.DEV_VPS_USER }}
      VPS_DEPLOY_PATH: ${{ secrets.DEV_VPS_DEPLOY_PATH }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.DEV_VPS_SSH_PRIVATE_KEY }}
      DEPLOY_BRANCH: main
      BOOK_RAG_ROLLOUT_MODE: ${{ inputs.book_rag_citation_mode || 'preserve' }}
    steps:
      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail

          : "${VPS_HOST:?Set the DEV_VPS_HOST repository secret}"
          : "${VPS_USER:?Set the DEV_VPS_USER repository secret}"
          : "${VPS_DEPLOY_PATH:?Set the DEV_VPS_DEPLOY_PATH repository secret}"
          : "${VPS_SSH_PRIVATE_KEY:?Set the DEV_VPS_SSH_PRIVATE_KEY repository secret}"

          if [ "$GITHUB_REF" != "refs/heads/$DEPLOY_BRANCH" ]; then
            echo "dev deploy rejected: workflow ref must be refs/heads/$DEPLOY_BRANCH, got $GITHUB_REF" >&2
            exit 1
          fi
          DEPLOY_SHA="$GITHUB_SHA"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/surau_deploy_key
          chmod 600 ~/.ssh/surau_deploy_key
          for keyscan_attempt in {1..12}; do
            if ssh-keyscan -T 10 -H "$VPS_HOST" >> ~/.ssh/known_hosts; then
              break
            fi
            if [ "$keyscan_attempt" -eq 12 ]; then
              echo "dev deploy rejected: SSH host key remained unavailable after 12 attempts" >&2
              exit 1
            fi
            sleep 5
          done

          ssh -i ~/.ssh/surau_deploy_key \
            -o IdentitiesOnly=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "$VPS_USER@$VPS_HOST" \
            "DEPLOY_BRANCH='$DEPLOY_BRANCH' DEPLOY_PATH='$VPS_DEPLOY_PATH' \
            DEPLOY_SHA='$DEPLOY_SHA' APP_ENV='dev' \
            BOOK_RAG_ROLLOUT_MODE='$BOOK_RAG_ROLLOUT_MODE' bash -s" <<'REMOTE'
          set -euo pipefail
          export APP_ENV

          cd "$DEPLOY_PATH"

          # A canceled SSH workflow can leave `docker exec /backfill` running
          # inside the existing app container: Docker owns that exec process
          # after the client disconnects. A canceled snapshot can likewise
          # leave pg_dump behind. Stop only those two one-shot commands as the
          # first remote action, before prune/git/snapshot contend for the same
          # constrained host. Every catalog write is one-book atomic and its
          # queue is resumable; app/database server processes remain untouched.
          stop_stale_container_processes() {
            service_name="$1"
            process_name="$2"
            container_id="$(sudo docker compose --env-file .env.production \
              -f docker-compose.prod.yml ps -q "$service_name" 2>/dev/null || true)"
            if [ -z "$container_id" ]; then
              return
            fi

            mapfile -t stale_pids < <(sudo docker top "$container_id" -eo pid,comm 2>/dev/null \
              | awk -v name="$process_name" 'NR > 1 && $2 == name { print $1 }')
            if [ "${#stale_pids[@]}" -eq 0 ]; then
              return
            fi

            echo "Stopping ${#stale_pids[@]} stale $process_name process(es) before snapshot..."
            sudo kill -TERM "${stale_pids[@]}" 2>/dev/null || true

            for attempt in {1..30}; do
              mapfile -t stale_pids < <(sudo docker top "$container_id" -eo pid,comm 2>/dev/null \
                | awk -v name="$process_name" 'NR > 1 && $2 == name { print $1 }')
              if [ "${#stale_pids[@]}" -eq 0 ]; then
                return
              fi
              sleep 1
            done

            echo "Stale $process_name ignored SIGTERM; forcing bounded cleanup" >&2
            sudo kill -KILL "${stale_pids[@]}" 2>/dev/null || true
          }
          stop_stale_container_processes app backfill
          stop_stale_container_processes db pg_dump

          # A failed deploy keeps the running image but can leave stopped
          # containers, dangling images, and build cache. Reclaim only unused
          # Docker artifacts before git/snapshot need working space; volumes
          # and the running database are never touched.
          sudo docker container prune -f --filter 'until=1h' >/dev/null 2>&1 || true
          sudo docker image prune -f >/dev/null 2>&1 || true
          sudo docker builder prune -af --filter 'until=1h' >/dev/null 2>&1 || true

          git fetch origin "$DEPLOY_BRANCH"
          REMOTE_MAIN_SHA="$(git rev-parse FETCH_HEAD)"
          if [ "$REMOTE_MAIN_SHA" != "$DEPLOY_SHA" ]; then
            echo "dev deploy rejected: origin/$DEPLOY_BRANCH moved to $REMOTE_MAIN_SHA after workflow pinned $DEPLOY_SHA" >&2
            exit 1
          fi
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "$DEPLOY_SHA"
          ACTUAL_SHA="$(git rev-parse HEAD)"
          if [ "$ACTUAL_SHA" != "$DEPLOY_SHA" ]; then
            echo "dev deploy rejected: checked-out SHA $ACTUAL_SHA does not match pinned SHA $DEPLOY_SHA" >&2
            exit 1
          fi
          APP_VERSION="dev-${ACTUAL_SHA:0:7}"
          export APP_VERSION

          set_env_value() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" .env.production; then
              sed -i "s/^${key}=.*/${key}=${value}/" .env.production
            else
              printf '%s=%s\n' "$key" "$value" >> .env.production
            fi
          }

          remove_env_value() {
            key="$1"
            sed -i "/^${key}=/d" .env.production
          }

          run_with_heartbeat() {
            label="$1"
            shift
            started_at="$(date +%s)"
            "$@" &
            command_pid=$!
            while kill -0 "$command_pid" 2>/dev/null; do
              elapsed_seconds=$(( $(date +%s) - started_at ))
              echo "deploy heartbeat: $label still running (${elapsed_seconds}s)"
              sleep 30
            done
            wait "$command_pid"
          }

          ROLLOUT_EVIDENCE=.k1-book-rag-dual-evidence
          UNIT_DEFAULT_MARKER=.k1-book-rag-unit-default-enabled
          CURRENT_BOOK_RAG_MODE=""
          if grep -q '^RAG_BOOK_CITATION_MODE=' .env.production; then
            CURRENT_BOOK_RAG_MODE="$(sed -n 's/^RAG_BOOK_CITATION_MODE=//p' .env.production | tail -1)"
          elif [ -f "$UNIT_DEFAULT_MARKER" ]; then
            CURRENT_BOOK_RAG_MODE=default
          fi

          # A server that has never seen K-1 starts in legacy mode. Subsequent
          # push deploys preserve the current rollout state; workflow_dispatch
          # is the only path that deliberately moves legacy → dual → unit →
          # code default. The marker prevents a later push from re-pinning an
          # already-promoted host to legacy after the explicit override is gone.
          if [ -z "$CURRENT_BOOK_RAG_MODE" ]; then
            set_env_value RAG_BOOK_CITATION_MODE legacy
            CURRENT_BOOK_RAG_MODE=legacy
          fi

          case "$CURRENT_BOOK_RAG_MODE" in
            legacy|dual|unit|default) ;;
            *) echo "invalid persisted Book-RAG rollout mode: $CURRENT_BOOK_RAG_MODE" >&2; exit 1 ;;
          esac

          CANDIDATE_BOOK_RAG_MODE="$CURRENT_BOOK_RAG_MODE"
          TARGET_BOOK_RAG_STATE=preserve
          case "$BOOK_RAG_ROLLOUT_MODE" in
            preserve) ;;
            legacy)
              CANDIDATE_BOOK_RAG_MODE=legacy
              TARGET_BOOK_RAG_STATE=legacy
              ;;
            dual)
              case "$CURRENT_BOOK_RAG_MODE" in
                legacy|dual|unit|default) ;;
                *) echo "dual rollout requires an initialized K-1 mode" >&2; exit 1 ;;
              esac
              CANDIDATE_BOOK_RAG_MODE=dual
              TARGET_BOOK_RAG_STATE=dual
              ;;
            unit)
              if [ "$CURRENT_BOOK_RAG_MODE" != dual ]; then
                echo "unit rollout rejected: current mode must be dual" >&2
                exit 1
              fi
              if ! grep -qx "version=$APP_VERSION" "$ROLLOUT_EVIDENCE" 2>/dev/null; then
                echo "unit rollout rejected: no parity evidence for $APP_VERSION" >&2
                exit 1
              fi
              if ! grep -qx "sha=$ACTUAL_SHA" "$ROLLOUT_EVIDENCE" 2>/dev/null; then
                echo "unit rollout rejected: parity evidence is not bound to $ACTUAL_SHA" >&2
                exit 1
              fi
              CANDIDATE_BOOK_RAG_MODE=unit
              TARGET_BOOK_RAG_STATE=unit
              ;;
            default)
              if [ "$CURRENT_BOOK_RAG_MODE" != unit ]; then
                echo "default rollout rejected: current mode must be unit" >&2
                exit 1
              fi
              if ! grep -qx "version=$APP_VERSION" "$ROLLOUT_EVIDENCE" 2>/dev/null; then
                echo "default rollout rejected: no parity evidence for $APP_VERSION" >&2
                exit 1
              fi
              if ! grep -qx "sha=$ACTUAL_SHA" "$ROLLOUT_EVIDENCE" 2>/dev/null; then
                echo "default rollout rejected: parity evidence is not bound to $ACTUAL_SHA" >&2
                exit 1
              fi
              CANDIDATE_BOOK_RAG_MODE=default
              TARGET_BOOK_RAG_STATE=default
              ;;
            *) echo "invalid Book-RAG rollout mode" >&2; exit 1 ;;
          esac

          # `default` is a persisted rollout state, not an application config
          # value. Its runtime is unit mode, but the env override must stay
          # absent so every later push keeps proving the code default itself.
          RUNTIME_BOOK_RAG_MODE="$CANDIDATE_BOOK_RAG_MODE"
          if [ "$RUNTIME_BOOK_RAG_MODE" = default ]; then
            RUNTIME_BOOK_RAG_MODE=unit
          fi

          # Save only rollout-owned state. The candidate mode is injected into
          # compose via the process environment and is not persisted until all
          # verification gates pass. If a candidate container fails any gate,
          # the EXIT trap restores these files and recreates the prior mode.
          ROLLOUT_STATE_DIR="$(mktemp -d .k1-rollout-state.XXXXXX)"
          grep '^RAG_BOOK_CITATION_MODE=' .env.production > "$ROLLOUT_STATE_DIR/mode-lines" || true
          if [ -f "$ROLLOUT_EVIDENCE" ]; then
            cp "$ROLLOUT_EVIDENCE" "$ROLLOUT_STATE_DIR/evidence"
            touch "$ROLLOUT_STATE_DIR/had-evidence"
          fi
          if [ -f "$UNIT_DEFAULT_MARKER" ]; then
            touch "$ROLLOUT_STATE_DIR/had-default-marker"
          fi

          restore_rollout_state() {
            remove_env_value RAG_BOOK_CITATION_MODE
            if [ -s "$ROLLOUT_STATE_DIR/mode-lines" ]; then
              cat "$ROLLOUT_STATE_DIR/mode-lines" >> .env.production
            fi
            if [ -f "$ROLLOUT_STATE_DIR/had-evidence" ]; then
              cp "$ROLLOUT_STATE_DIR/evidence" "$ROLLOUT_EVIDENCE"
            else
              rm -f "$ROLLOUT_EVIDENCE"
            fi
            if [ -f "$ROLLOUT_STATE_DIR/had-default-marker" ]; then
              touch "$UNIT_DEFAULT_MARKER"
            else
              rm -f "$UNIT_DEFAULT_MARKER"
            fi
          }

          ROLLBACK_ARMED=false
          ROLLOUT_COMMITTED=false
          cleanup_rollout() {
            status=$?
            trap - EXIT
            set +e
            if [ "$status" -ne 0 ] && [ "$ROLLBACK_ARMED" = true ] && [ "$ROLLOUT_COMMITTED" = false ]; then
              echo "K-1 rollout candidate failed; restoring $CURRENT_BOOK_RAG_MODE" >&2
              restore_rollout_state
              unset RAG_BOOK_CITATION_MODE
              ROLLBACK_COMPOSE_ARGS=()
              if [ "$CURRENT_BOOK_RAG_MODE" = default ]; then
                ROLLBACK_COMPOSE_ARGS=(-f docker-compose.code-default.yml)
              fi
              sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml \
                "${ROLLBACK_COMPOSE_ARGS[@]}" "${PROFILE_ARGS[@]}" \
                up -d --force-recreate "${SERVICES[@]}" || \
                echo "K-1 rollback recreate failed; operator action required" >&2
            fi
            rm -f "$ROLLOUT_STATE_DIR/mode-lines" "$ROLLOUT_STATE_DIR/evidence" \
              "$ROLLOUT_STATE_DIR/had-evidence" "$ROLLOUT_STATE_DIR/had-default-marker"
            rmdir "$ROLLOUT_STATE_DIR" 2>/dev/null || true
            exit "$status"
          }
          trap cleanup_rollout EXIT

          EFFECTIVE_BOOK_RAG_MODE="$RUNTIME_BOOK_RAG_MODE"
          DUAL_EVIDENCE_READY=false
          DUAL_MISMATCH_TOTAL=""
          DUAL_FALLBACK_TOTAL=""

          # Collaborative editing is opt-in: when .env.production enables it,
          # deploy and health-check the collab websocket service too.
          PROFILE_ARGS=()
          SERVICES=(app)
          COLLAB_CHECK=""
          if grep -q '^COLLAB_ENABLED=true' .env.production; then
            PROFILE_ARGS=(--profile collab)
            SERVICES+=(collab)
            COLLAB_CHECK="http://127.0.0.1:8090/healthz"
          fi

          # The book-scoped FTS expand migration is index-only. If a previous
          # candidate was killed by the intentionally short health window while
          # PostgreSQL was still building it, the app is crash-looping on the
          # exact dirty version below. Recover service before the next (long)
          # snapshot: discard only the invalid index shell and rewind only this
          # known index-only migration. The failed attempt already completed its
          # protected snapshot before setting the dirty bit; no content rows are
          # changed by this repair.
          schema_state="$(sudo docker compose --env-file .env.production \
            -f docker-compose.prod.yml exec -T db sh -c \
            'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
              "SELECT version::text || chr(58) || dirty::text FROM schema_migrations"' </dev/null)"
          if [ "$schema_state" = "20260714000003:true" ]; then
            echo "Recovering interrupted book-scoped K-1 FTS migration..."
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml stop app
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
              exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                -c "DROP INDEX CONCURRENTLY IF EXISTS idx_citable_units_book_text_fts_interpretive"' </dev/null
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
              exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c \
                "UPDATE schema_migrations SET version=20260714000002, dirty=FALSE \
                 WHERE version=20260714000003 AND dirty"' </dev/null
            rewound_book_fts_state="$(sudo docker compose --env-file .env.production \
              -f docker-compose.prod.yml exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
                "SELECT version::text || chr(58) || dirty::text FROM schema_migrations"' </dev/null)"
            if [ "$rewound_book_fts_state" != "20260714000002:false" ]; then
              echo "Book-scoped K-1 FTS rewind produced unexpected state: $rewound_book_fts_state" >&2
              exit 1
            fi
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml start app
            for recovery_attempt in {1..60}; do
              if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
                break
              fi
              if [ "$recovery_attempt" -eq 60 ]; then
                echo "Book-scoped K-1 FTS rewind did not restore the existing app" >&2
                sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
                  logs --tail=120 app
                exit 1
              fi
              sleep 2
            done
          fi

          # Snapshot the DB before the new image auto-migrates on boot, so a bad
          # migration can be rolled back. Encrypted + uploaded to R2 with 7-day
          # retention (E6); dump failure aborts the deploy ("no backup, no deploy"),
          # R2-upload failure alarms Telegram but lets the deploy continue.
          # </dev/null is load-bearing: the script uses `exec -T`, which otherwise
          # consumes this script's stdin (the ssh heredoc), swallowing every
          # command after the snapshot.
          echo "Snapshotting DB before migrate..."
          sudo env DEPLOY_PATH="$DEPLOY_PATH" \
            "$DEPLOY_PATH/ops/backup/surau-predeploy-snapshot" </dev/null

          available_kb="$(df -Pk "$DEPLOY_PATH" | awk 'NR == 2 { print $4 }')"
          minimum_kb=$((2 * 1024 * 1024))
          if [ "$available_kb" -lt "$minimum_kb" ]; then
            echo "dev deploy rejected: less than 2GiB free after safe cleanup and snapshot" >&2
            sudo /usr/local/sbin/surau-notify \
              "⚠️ Deploy DEV K-1 dibatalkan: ruang disk setelah cleanup <2GiB. Perbesar disk sebelum melanjutkan katalog." || true
            exit 1
          fi
          df -h "$DEPLOY_PATH"

          # Failed one-book transactions leave reusable dead tuples. A regular
          # online VACUUM makes those pages available to the resumed catalog;
          # it does not rewrite/truncate the table or block public reads.
          sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
            exec -T db sh -c \
              'vacuumdb -U "$POSTGRES_USER" -d "$POSTGRES_DB" --analyze \
                --table=citable_units --table=citable_unit_lineage \
                --table=citable_unit_catalog_queue' </dev/null

          # The first profile-v3 deploy can be interrupted while PostgreSQL is
          # building the large K-1 FTS index concurrently. App bootstrap marks
          # the migration dirty before executing it, while the deploy health
          # window is intentionally short. Recover only this exact known state:
          # preserve the predeploy backup, stop the crash-looping app to remove
          # races, discard any invalid concurrent-index shell, rewind one
          # migration, build the same index with bounded memory and a heartbeat,
          # then let the existing image complete the idempotent migration.
          schema_state="$(sudo docker compose --env-file .env.production \
            -f docker-compose.prod.yml exec -T db sh -c \
            'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
              "SELECT version::text || chr(58) || dirty::text FROM schema_migrations"' </dev/null)"
          if [ "$schema_state" = "20260713000016:true" ]; then
            echo "Recovering interrupted K-1 FTS migration after protected snapshot..."
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml stop app
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
              exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                -c "DROP INDEX CONCURRENTLY IF EXISTS idx_citable_units_text_fts_interpretive"' </dev/null
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
              exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c \
                "UPDATE schema_migrations SET version=20260713000015, dirty=FALSE \
                 WHERE version=20260713000016 AND dirty"' </dev/null
            rewound_state="$(sudo docker compose --env-file .env.production \
              -f docker-compose.prod.yml exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
                "SELECT version::text || chr(58) || dirty::text FROM schema_migrations"' </dev/null)"
            if [ "$rewound_state" != "20260713000015:false" ]; then
              echo "K-1 FTS migration rewind produced unexpected state: $rewound_state" >&2
              exit 1
            fi
            run_with_heartbeat k1-fts-index-recovery \
              sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
              exec -T -e 'PGOPTIONS=-c maintenance_work_mem=64MB' db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c \
                "CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_citable_units_text_fts_interpretive \
                 ON citable_units USING gin ( \
                   to_tsvector('\''simple'\''::regconfig, translate(text, '\''ًٌٍَُِّْٰٕٓٔـ'\'', '\'''\'')) \
                 ) \
                 WHERE lifecycle = '\''active'\'' \
                   AND corpus = '\''kitab'\'' \
                   AND interpretive_retrieval_eligible \
                   AND content_role = '\''book_page'\'' \
                   AND heading_id IS NOT NULL \
                   AND page_id IS NOT NULL"' </dev/null
            index_valid="$(sudo docker compose --env-file .env.production \
              -f docker-compose.prod.yml exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
                "SELECT index.indisvalid \
                 FROM pg_index index \
                 JOIN pg_class relation ON relation.oid=index.indexrelid \
                 WHERE relation.relname='\''idx_citable_units_text_fts_interpretive'\''"' </dev/null)"
            if [ "$index_valid" != "t" ]; then
              echo "K-1 FTS migration recovery did not produce a valid index" >&2
              exit 1
            fi
            sudo docker compose --env-file .env.production -f docker-compose.prod.yml start app
            for recovery_attempt in {1..60}; do
              if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
                break
              fi
              if [ "$recovery_attempt" -eq 60 ]; then
                echo "K-1 FTS migration recovery did not restore the existing app" >&2
                sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
                  logs --tail=120 app
                exit 1
              fi
              sleep 2
            done
            completed_state="$(sudo docker compose --env-file .env.production \
              -f docker-compose.prod.yml exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
                "SELECT version::text || chr(58) || dirty::text FROM schema_migrations"' </dev/null)"
            if [ "$completed_state" != "20260713000016:false" ]; then
              echo "K-1 FTS migration recovery finished in unexpected state: $completed_state" >&2
              exit 1
            fi
          fi

          # Build the new book-scoped posting list while the existing app keeps
          # serving traffic. The migration itself then sees the valid index and
          # only records its version during candidate boot, well inside the
          # health window. This keeps the expand step online and observable.
          schema_state="$(sudo docker compose --env-file .env.production \
            -f docker-compose.prod.yml exec -T db sh -c \
            'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
              "SELECT version::text || chr(58) || dirty::text FROM schema_migrations"' </dev/null)"
          if [ "$schema_state" = "20260714000002:false" ]; then
            book_fts_index_valid="$(sudo docker compose --env-file .env.production \
              -f docker-compose.prod.yml exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
                "SELECT COALESCE(bool_and(index.indisvalid), FALSE) \
                 FROM pg_class relation \
                 LEFT JOIN pg_index index ON index.indexrelid=relation.oid \
                 WHERE relation.relname='\''idx_citable_units_book_text_fts_interpretive'\''"' </dev/null)"
            if [ "$book_fts_index_valid" != "t" ]; then
              sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
                exec -T db sh -c \
                'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                  -c "DROP INDEX CONCURRENTLY IF EXISTS idx_citable_units_book_text_fts_interpretive"' </dev/null
              run_with_heartbeat k1-book-fts-index-expand \
                sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
                exec -T -e 'PGOPTIONS=-c maintenance_work_mem=64MB' db sh -c \
                'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c \
                  "CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_citable_units_book_text_fts_interpretive \
                   ON citable_units USING gin ( \
                     to_tsvector( \
                       '\''simple'\''::regconfig, \
                       '\''book'\'' || book_id::text || '\'' '\'' || \
                         translate(text, '\''ًٌٍَُِّْٰٕٓٔـ'\'', '\'''\'') \
                     ) \
                   ) \
                   WHERE lifecycle = '\''active'\'' \
                     AND corpus = '\''kitab'\'' \
                     AND interpretive_retrieval_eligible \
                     AND content_role = '\''book_page'\'' \
                     AND heading_id IS NOT NULL \
                     AND page_id IS NOT NULL"' </dev/null
            fi
            book_fts_index_valid="$(sudo docker compose --env-file .env.production \
              -f docker-compose.prod.yml exec -T db sh -c \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -Atc \
                "SELECT index.indisvalid \
                 FROM pg_index index \
                 JOIN pg_class relation ON relation.oid=index.indexrelid \
                 WHERE relation.relname='\''idx_citable_units_book_text_fts_interpretive'\''"' </dev/null)"
            if [ "$book_fts_index_valid" != "t" ]; then
              echo "Book-scoped K-1 FTS expand did not produce a valid index" >&2
              exit 1
            fi
          fi

          # Bound build-cache growth so a full disk can't fail the build.
          sudo docker builder prune -f --filter 'until=72h' >/dev/null 2>&1 || true

          # Build explicitly so a build error (e.g. disk full) fails the deploy loudly,
          # then --force-recreate so the freshly built image AND the new APP_VERSION are
          # guaranteed to run. A plain `up --build` can rebuild yet leave the OLD
          # container in place, which the health check would then pass — masking a
          # non-deploy.
          sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" build "${SERVICES[@]}"
          CANDIDATE_COMPOSE_ARGS=()
          if [ "$CANDIDATE_BOOK_RAG_MODE" = default ]; then
            # Remove both sources of explicit configuration before creating
            # the candidate. The Compose override deletes the base mapping,
            # so /version and smoke tests exercise config.go's code default.
            remove_env_value RAG_BOOK_CITATION_MODE
            unset RAG_BOOK_CITATION_MODE
            CANDIDATE_COMPOSE_ARGS=(-f docker-compose.code-default.yml)
          else
            export RAG_BOOK_CITATION_MODE="$RUNTIME_BOOK_RAG_MODE"
          fi
          ROLLBACK_ARMED=true
          sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml \
            "${CANDIDATE_COMPOSE_ARGS[@]}" "${PROFILE_ARGS[@]}" \
            up -d --force-recreate "${SERVICES[@]}"
          for attempt in {1..30}; do
            # Assert /version reports the version we just deployed, so a container that
            # did not roll over is caught instead of looking healthy.
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null &&
               curl -fsS http://127.0.0.1:8080/readyz >/dev/null &&
               curl -fsS http://127.0.0.1:8080/version | grep -q "\"version\":\"$APP_VERSION\"" &&
               { [ -z "$COLLAB_CHECK" ] || curl -fsS "$COLLAB_CHECK" >/dev/null; }; then
              # Q-2 rollout/recovery is deliberately ordered: restore frozen
              # QPC page metadata first, then reconcile the same B-1 registry.
              # Both jobs are resumable/idempotent; -restart also catches rows
              # marked stale after an earlier completed run.
              sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                exec -T app /backfill -job=quran-page-navigation-v1 -chunk-size=500 -sleep=0s -restart
              sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                exec -T app /backfill -job=citable-units-quran -chunk-size=1 -sleep=0s -restart

              # Materialize the O-4-2 priority queue and the rest of the
              # raw-published catalog before committing any requested rollout
              # state, then run the all-catalog determinism drill. Later deploys
              # restart only the drift-aware catalog job; a completed
              # determinism job exits cleanly without replaying all books.
              run_with_heartbeat k1-priority-catalog \
                sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                exec -T -e GOMEMLIMIT=640MiB -e GOGC=50 app \
                  /backfill -job=citable-units-kitab-catalog -catalog-priority-only \
                  -chunk-size=1 -sleep=200ms -restart
              run_with_heartbeat k1-full-catalog \
                sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                exec -T -e GOMEMLIMIT=640MiB -e GOGC=50 app \
                  /backfill -job=citable-units-kitab-catalog \
                  -chunk-size=1 -sleep=200ms -restart
              run_with_heartbeat k1-determinism-rederive \
                sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                exec -T -e GOMEMLIMIT=640MiB -e GOGC=50 app \
                  /backfill -job=citable-units-kitab-catalog-rederive -chunk-size=1 -sleep=200ms -restart
              # The catalog can replace a large share of active rows. Refresh
              # planner statistics after LOAD so the p95 proof measures the
              # intended FTS plan rather than stale pre-backfill estimates.
              run_with_heartbeat k1-catalog-analyze \
                sudo docker compose --env-file .env.production -f docker-compose.prod.yml \
                  exec -T db sh -c \
                    'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                      -c "ANALYZE citable_units"' </dev/null
              run_with_heartbeat k1-catalog-verification \
                sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                exec -T -e GOMEMLIMIT=640MiB -e GOGC=50 app /backfill -verify-citable-catalog

              # Promotion evidence is generated by the deployed immutable
              # image. Dual/unit must keep parity mismatches and typed legacy
              # fallbacks flat while both JSON golden cases and one SSE call
              # produce resolvable current unit locators.
              if [ "$EFFECTIVE_BOOK_RAG_MODE" != legacy ]; then
                metric_value() {
                  prefix="$1"
                  curl -fsS http://127.0.0.1:8080/metrics \
                    | awk -v prefix="$prefix" 'index($1, prefix) == 1 { total += $2 } END { printf "%.0f", total + 0 }'
                }

                mismatch_before="$(metric_value 'surau_book_rag_citation_parity_total{result="mismatch"')"
                matched_before="$(metric_value 'surau_book_rag_citation_parity_total{result="matched"')"
                fallback_before="$(metric_value 'surau_book_rag_legacy_fallbacks_total')"

                sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                  exec -T app /rag-eval -base-url http://127.0.0.1:8080 \
                    -cases /eval/bookrag_smoke.jsonl -output json -verbose
                sudo -E docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" \
                  exec -T app /rag-eval -base-url http://127.0.0.1:8080 \
                    -cases /eval/bookrag_golden.jsonl -output json -verbose

                sse_output="$(mktemp)"
                curl -fsS --max-time 180 -N \
                  -H 'Content-Type: application/json' \
                  -d '{"question":"Apa definisi الحديث الصحيح?","stream":true,"include_trace":true,"max_citations":3}' \
                  'http://127.0.0.1:8080/v1/books/797/rag?lang=id' > "$sse_output"
                grep -Eq '"unit_id":"[0-9a-f-]+"' "$sse_output"
                grep -Eq '"unit_anchor":"kitab/[0-9]+/h/[0-9]+/u/[0-9]+"' "$sse_output"
                grep -Fq "\"citation_mode\":\"$EFFECTIVE_BOOK_RAG_MODE\"" "$sse_output"
                if grep -Fq '"legacy_fallback":true' "$sse_output"; then
                  echo "Book-RAG rollout smoke unexpectedly used legacy fallback" >&2
                  exit 1
                fi
                rm -f "$sse_output"

                mismatch_after="$(metric_value 'surau_book_rag_citation_parity_total{result="mismatch"')"
                matched_after="$(metric_value 'surau_book_rag_citation_parity_total{result="matched"')"
                fallback_after="$(metric_value 'surau_book_rag_legacy_fallbacks_total')"
                test "$mismatch_after" = "$mismatch_before"
                test "$fallback_after" = "$fallback_before"

                if [ "$EFFECTIVE_BOOK_RAG_MODE" = dual ]; then
                  if [ "$matched_after" -le "$matched_before" ]; then
                    echo "dual rollout did not execute an exact unit citation projection" >&2
                    exit 1
                  fi
                  DUAL_EVIDENCE_READY=true
                  DUAL_MISMATCH_TOTAL="$mismatch_after"
                  DUAL_FALLBACK_TOTAL="$fallback_after"
                fi
              fi

              # Do not call the rollout complete unless the two formerly
              # missing FE surfaces expose current Citable Unit identities.
              curl -fsS 'http://127.0.0.1:8080/v1/quran/pages/1/ayahs?view=reader_minimal' \
                | grep -Eq '"primary_unit_id":"[0-9a-f-]+"'
              quran_page_resolution="$(curl -fsS \
                'http://127.0.0.1:8080/v1/anchors/resolve?page_number=1')"
              grep -q '"target_type":"quran_ayah"' <<<"$quran_page_resolution"
              grep -Eq '"primary_unit_id":"[0-9a-f-]+"' <<<"$quran_page_resolution"
              grep -Eq '"primary_unit_anchor":"quran/[0-9]+:[0-9]+/u/1"' \
                <<<"$quran_page_resolution"
              curl -fsS http://127.0.0.1:8080/readyz >/dev/null

              case "$TARGET_BOOK_RAG_STATE" in
                preserve) ;;
                legacy)
                  set_env_value RAG_BOOK_CITATION_MODE legacy
                  rm -f "$ROLLOUT_EVIDENCE" "$UNIT_DEFAULT_MARKER"
                  ;;
                dual)
                  set_env_value RAG_BOOK_CITATION_MODE dual
                  rm -f "$UNIT_DEFAULT_MARKER"
                  ;;
                unit)
                  set_env_value RAG_BOOK_CITATION_MODE unit
                  rm -f "$UNIT_DEFAULT_MARKER"
                  ;;
                default)
                  remove_env_value RAG_BOOK_CITATION_MODE
                  touch "$UNIT_DEFAULT_MARKER"
                  ;;
                *) echo "invalid Book-RAG target state" >&2; exit 1 ;;
              esac
              if [ "$DUAL_EVIDENCE_READY" = true ]; then
                printf 'version=%s\nsha=%s\nparity_mismatch=%s\nfallbacks=%s\nverified_at=%s\n' \
                  "$APP_VERSION" "$ACTUAL_SHA" "$DUAL_MISMATCH_TOTAL" "$DUAL_FALLBACK_TOTAL" \
                  "$(date -u +%FT%TZ)" \
                  > "$ROLLOUT_EVIDENCE"
              fi
              ROLLOUT_COMMITTED=true
              ROLLBACK_ARMED=false
              unset RAG_BOOK_CITATION_MODE

              # Reclaim old images ONLY after the new release is proven healthy.
              sudo docker image prune -f
              exit 0
            fi

            sleep 2
          done

          sudo docker compose --env-file .env.production -f docker-compose.prod.yml "${PROFILE_ARGS[@]}" logs --tail=120 "${SERVICES[@]}"
          exit 1
          REMOTE
