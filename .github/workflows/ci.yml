name: CI
on: pull_request

jobs:
  golangci-lint:
    name: runner / golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=15m --new-from-merge-base=origin/main

  yamllint:
    name: runner / yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # reviewdog diffs against the base branch; a shallow clone makes
          # its git fetch flake ("shallow file has changed since we read it").
          fetch-depth: 0
      - uses: reviewdog/action-yamllint@v1
        with:
          fail_level: error
          reporter: github-pr-review
          yamllint_flags: '-c .yamllint.yml .'

  hadolint:
    name: runner / hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: reviewdog/action-hadolint@v1
        with:
          fail_level: error
          reporter: github-pr-review

  dotenv-linter:
    name: runner / dotenv-linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dotenv-linter/action-dotenv-linter@v3
        with:
          reporter: github-pr-review

  gitleaks:
    name: runner / gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-dependencies:
    name: runner / check-dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - name: WriteGoList
        run: go list -json -m all > go.list
      - name: Nancy
        uses: sonatype-nexus-community/nancy-github-action@main
        continue-on-error: true

  govulncheck:
    name: runner / govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - name: govulncheck
        run: go tool govulncheck ./...

  backup-scripts:
    name: runner / backup-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install age
        run: sudo apt-get update -qq && sudo apt-get install -y -qq age zstd
      - name: Shellcheck backup scripts
        run: |
          shellcheck ops/backup/surau-pg-backup ops/backup/surau-pg-restore-check \
            ops/backup/surau-backup-watchdog ops/backup/surau-notify \
            ops/backup/surau-alert ops/backup/install.sh ops/backup/test-backup-scripts.sh \
            ops/backup/surau-pitr-backup ops/backup/surau-pitr-check \
            ops/backup/surau-pg-pitr-restore ops/backup/surau-predeploy-snapshot
      - name: Backup script tests (encryption round-trip + latest selection)
        run: bash ops/backup/test-backup-scripts.sh

  unit-tests:
    name: runner / tests / unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - name: Unit Tests
        run: "make test"
      - name: Upload unit coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.txt

  # B-5: one immutable search-key/v1 corpus is executed by both runtimes.
  # Any semantic drift fails here before normalized database rows can diverge.
  normalization-contract:
    name: runner / contracts / normalization-go-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # The v1 immutability gate compares semantic artifacts with the
          # pull request merge-base, not with a checksum edited in the PR.
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Go search-key v1 golden corpus
        run: go test ./internal/quranutil ./internal/searchtext
      - name: Python parity against the same corpus
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest scripts.langextract_kg.test_arabic_normalize
      - name: Immutability guard tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest scripts.test_check_normalization_contract
      - name: Compare frozen profiles with PR base
        env:
          NORMALIZATION_BASE_REF: origin/${{ github.base_ref }}
        run: python3 scripts/check_normalization_contract.py

  # B-6: every active machine-enrichment generator and QA gate must preserve
  # model + prompt version + run identity, including resume and mixed prompts.
  enrichment-contracts:
    name: runner / contracts / enrichment-generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: scripts/langextract_kg/requirements.txt
      - name: Install extraction test dependencies
        run: python3 -m pip install -r scripts/langextract_kg/requirements.txt
      - name: Python enrichment contract tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s scripts -p 'test_*.py'

  # Runs the SURAU_LIVE_PG-gated live tests (self-seeding DB invariants: coverage_count
  # triggers, audio-import atomicity, progress double-count, default recitation, editorial
  # idempotency) against a real Postgres so they are a true CI gate, not skipped.
  live-tests:
    name: runner / tests / live
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_URL: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
      SURAU_LIVE_PG: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - name: Install migrate CLI (postgres driver)
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
      - name: Apply migrations
        run: migrate -path migrations -database "$PG_URL" up
      - name: Live tests
        # -p 1 serializes the packages so they do not race on the shared DB.
        # internal/app runs the bootstrap smoke (F1-E AC-2); the coverage
        # profile feeds the coverage-gate job (live-only paths like app.Run
        # get credit there). The latency gate runs separately without race/
        # coverage instrumentation so it measures the real query budget.
        run: >-
          go test -p 1 -race -covermode atomic -coverprofile=coverage-live.txt
          -coverpkg=./internal/...,./pkg/...
          -run TestLive -skip '^TestLiveCrossReferenceQueryPerformance$'
          ./internal/repo/persistent/ ./internal/importer/ ./internal/backfill/
          ./internal/usecase/notification/ ./internal/app/
      - name: Cross-Reference 40k latency gate
        run: >-
          go test -p 1 -count=1 -run '^TestLiveCrossReferenceQueryPerformance$'
          ./internal/repo/persistent/
      - name: Upload live coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-live
          path: coverage-live.txt

  # F1-E (AC-3): a PR whose NEW code is under the 70% ratchet fails. Diff
  # coverage comes from cmd/diffcover over the union of the unit and live
  # profiles (live-only paths like the app bootstrap still get credit); the
  # repo-wide total is reported in the job summary and a sticky PR comment.
  coverage-gate:
    name: runner / coverage-gate
    runs-on: ubuntu-latest
    needs: [unit-tests, live-tests]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          # The gate diffs against the merge-base with the base branch, same
          # as golangci-lint's --new-from-merge-base.
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-live
      - name: Diff coverage gate (new code >=70%)
        run: |
          set -euo pipefail
          git diff -U0 --no-color "origin/${{ github.base_ref }}...HEAD" > diff.patch
          go run ./cmd/diffcover -diff diff.patch \
            -profile coverage.txt -profile coverage-live.txt \
            -threshold 70 -markdown-out diffcover.md
      - name: Report coverage on the PR (sticky comment, best effort)
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -f diffcover.md ] || exit 0
          existing="$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --paginate --jq '.[] | select(.body | startswith("<!-- diffcover -->")) | .id' | head -1)"
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" -F body=@diffcover.md >/dev/null
          else
            gh api -X POST "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -F body=@diffcover.md >/dev/null
          fi

  # F1-E (AC-2): proves every down migration reverses its up on an empty DB —
  # up all -> down all -> up all. "down -all" must leave zero app-owned objects
  # (extension-owned functions excluded), and the schema dump must be identical
  # after both up passes (pg_dump's random \restrict tokens filtered out).
  migration-roundtrip:
    name: runner / migrations / round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          # Dedicated name is part of the Q-1/Q-2/Q-4 populated migration drills'
          # destructive-test safety gate. No dev/live database may match it.
          POSTGRES_DB: surau_q1_migration_drill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d surau_q1_migration_drill"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_URL: "postgres://postgres:postgres@localhost:5432/surau_q1_migration_drill?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5
      - name: Install migrate CLI (postgres driver)
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
      - name: Q-1 populated grandfather migration drill
        env:
          SURAU_Q1_MIGRATION_DRILL_PG: "${{ env.PG_URL }}"
          SURAU_Q1_MIGRATION_DRILL_ACK: destroy-surau-q1-migration-drill
        run: |
          set -euo pipefail
          migrate -path migrations -database "$PG_URL" goto 20260711000005
          go test -count=1 -run '^TestQuranEditorialGrandfatherMigrationDrill$' ./internal/repo/persistent/
      - name: Q-2 populated backbone-preservation migration drill
        env:
          SURAU_Q2_MIGRATION_DRILL_PG: "${{ env.PG_URL }}"
          SURAU_Q2_MIGRATION_DRILL_ACK: destroy-surau-q2-migration-drill
        run: |
          set -euo pipefail
          migrate -path migrations -database "$PG_URL" goto 20260711000006
          go test -count=1 -run '^TestQuranCitableUnitMigrationDrill$' ./internal/repo/persistent/
      - name: Q-4 slug registry migration drill
        env:
          SURAU_Q4_MIGRATION_DRILL_PG: "${{ env.PG_URL }}"
          SURAU_Q4_MIGRATION_DRILL_ACK: destroy-surau-q4-migration-drill
        run: |
          set -euo pipefail
          migrate -path migrations -database "$PG_URL" goto 20260714000003
          go test -count=1 -run '^TestQuranSlugRegistryMigrationDrill$' ./internal/repo/persistent/
      - name: Up all (first pass) and assert version
        run: |
          set -euo pipefail
          migrate -path migrations -database "$PG_URL" up
          version="$(migrate -path migrations -database "$PG_URL" version 2>&1)"
          expected="$(basename "$(find migrations -name '*.up.sql' | sort | tail -1)" | cut -d_ -f1)"
          echo "version after up: ${version} (expected ${expected})"
          [ "$version" = "$expected" ]
      - name: Dump schema A
        # pg_dump must match the server major; ubuntu-latest ships an older
        # client, so dump through the already-pulled server image instead.
        run: |
          set -euo pipefail
          docker run --rm --network host postgres:18.4-alpine \
            pg_dump "$PG_URL" --schema-only --no-owner --no-privileges \
            | grep -vE '^\\(un)?restrict ' > /tmp/schema-A.sql
          wc -l /tmp/schema-A.sql
      - name: Down all
        run: migrate -path migrations -database "$PG_URL" down -all
      - name: Assert schema is empty after down
        run: |
          set -euo pipefail
          leftovers="$(docker run --rm --network host postgres:18.4-alpine psql "$PG_URL" -At -c "
            SELECT count(*) FROM (
              SELECT tablename AS obj FROM pg_tables WHERE schemaname='public' AND tablename<>'schema_migrations'
              UNION ALL SELECT viewname FROM pg_views WHERE schemaname='public'
              UNION ALL SELECT matviewname FROM pg_matviews WHERE schemaname='public'
              UNION ALL SELECT t.typname FROM pg_type t JOIN pg_namespace n ON n.oid=t.typnamespace
                WHERE n.nspname='public' AND t.typtype='e'
              UNION ALL SELECT sequencename FROM pg_sequences WHERE schemaname='public'
              UNION ALL SELECT p.proname FROM pg_proc p JOIN pg_namespace n ON n.oid=p.pronamespace
                WHERE n.nspname='public'
                  AND NOT EXISTS (SELECT 1 FROM pg_depend d WHERE d.objid=p.oid AND d.deptype='e')
            ) leftovers;")"
          echo "app-owned leftover objects after down -all: ${leftovers}"
          [ "$leftovers" = "0" ]
      - name: Up all (second pass) and diff schema
        run: |
          set -euo pipefail
          migrate -path migrations -database "$PG_URL" up
          docker run --rm --network host postgres:18.4-alpine \
            pg_dump "$PG_URL" --schema-only --no-owner --no-privileges \
            | grep -vE '^\\(un)?restrict ' > /tmp/schema-B.sql
          diff /tmp/schema-A.sql /tmp/schema-B.sql
          echo "schema identical after down/up round-trip"

  collab-server:
    name: runner / collab-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collab-server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: collab-server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  # F1-E / F1-D8: one retry max, and using it is an ALARM (Telegram + warning),
  # not a crutch — the readiness-wait in integration-test/reader_test.go plus
  # the db healthcheck in docker-compose.yml are the actual de-flake. The
  # 10-run no-retry proof lives in integration-soak.yml (AC-1).
  integration-tests:
    name: runner / tests / integration
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v6
      - name: Integration tests (attempt 1)
        id: attempt1
        continue-on-error: true
        run: make compose-up-integration-test
      - name: Reset stack before retry
        if: steps.attempt1.outcome == 'failure'
        run: docker compose -f docker-compose.yml -f docker-compose-integration-test.yml down --remove-orphans -v || true
      - name: Integration tests (single retry — F1-D8)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        run: |
          set -euo pipefail
          sleep 15
          make compose-up-integration-test
      - name: Mark retry usage (retry is an alarm, not a crutch)
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'success'
        run: |
          echo "::warning::Integration suite needed its single retry (F1-D8) — green, but investigate the flake."
          {
            echo "### ⚠️ Integration retry terpakai (F1-D8)"
            echo ""
            echo "Attempt 1 gagal, attempt 2 hijau. Retry adalah alarm, bukan kruk — selidiki flake-nya."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Telegram alarm — retry was needed
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'success'
        uses: ./.github/actions/telegram-notify
        with:
          message: >-
            ⚠️ Integration suite butuh retry (attempt 1 gagal, attempt 2 hijau) pada PR
            #${{ github.event.pull_request.number }}. Retry = alarm (F1-D8), selidiki:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Telegram alarm — suite failed even after retry
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome != 'success'
        uses: ./.github/actions/telegram-notify
        with:
          message: >-
            ❌ Integration suite GAGAL setelah retry pada PR
            #${{ github.event.pull_request.number }}:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Fail the job if the suite never passed
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome != 'success'
        run: exit 1
