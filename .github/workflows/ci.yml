name: CI
on: pull_request

jobs:
  golangci-lint:
    name: runner / golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=15m --new-from-merge-base=origin/main

  yamllint:
    name: runner / yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # reviewdog diffs against the base branch; a shallow clone makes
          # its git fetch flake ("shallow file has changed since we read it").
          fetch-depth: 0
      - uses: reviewdog/action-yamllint@v1
        with:
          fail_level: error
          reporter: github-pr-review
          yamllint_flags: '-c .yamllint.yml .'

  hadolint:
    name: runner / hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: reviewdog/action-hadolint@v1
        with:
          fail_level: error
          reporter: github-pr-review

  dotenv-linter:
    name: runner / dotenv-linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dotenv-linter/action-dotenv-linter@v3
        with:
          reporter: github-pr-review

  check-dependencies:
    name: runner / check-dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - name: WriteGoList
        run: go list -json -m all > go.list
      - name: Nancy
        uses: sonatype-nexus-community/nancy-github-action@main
        continue-on-error: true

  govulncheck:
    name: runner / govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - name: govulncheck
        run: go tool govulncheck ./...

  unit-tests:
    name: runner / tests / unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - name: Unit Tests
        run: "make test"
      - name: Upload coverage report
        run: bash <(curl -s https://codecov.io/bash)

  # Runs the SURAU_LIVE_PG-gated live tests (self-seeding DB invariants: coverage_count
  # triggers, audio-import atomicity, progress double-count, default recitation, editorial
  # idempotency) against a real Postgres so they are a true CI gate, not skipped.
  live-tests:
    name: runner / tests / live
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_URL: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
      SURAU_LIVE_PG: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - name: Install migrate CLI (postgres driver)
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
      - name: Apply migrations
        run: migrate -path migrations -database "$PG_URL" up
      - name: Live tests
        # -p 1 serializes the two packages so they do not race on the shared DB;
        # -skip excludes the read-path test that expects a pre-seeded corpus.
        run: go test -p 1 -race -run TestLive -skip TestLiveAyahEditorialReadPath ./internal/repo/persistent/ ./internal/importer/

  collab-server:
    name: runner / collab-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collab-server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: collab-server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  integration-tests:
    name: runner / tests / integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Integration tests
        shell: bash
        run: |
          set -euo pipefail

          status=0
          for attempt in 1 2 3; do
            echo "Integration test attempt ${attempt}/3"
            make compose-up-integration-test && exit 0
            status=$?

            docker compose -f docker-compose.yml -f docker-compose-integration-test.yml down --remove-orphans -v || true
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            sleep $((attempt * 15))
          done
